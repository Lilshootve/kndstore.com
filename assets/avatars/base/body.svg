<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <style>
      .outline{fill:none;stroke:#9aa4b2;stroke-width:6;stroke-linecap:round;stroke-linejoin:round;opacity:.9}
      .skin{fill:var(--av-skin,#b9c2cc)}
      .accent{stroke:var(--av-accent,#19d3ff);stroke-width:6;stroke-linecap:round;opacity:.9}
      .panel{fill:rgba(255,255,255,.03);stroke:rgba(255,255,255,.10);stroke-width:4}
    </style>
  </defs>

  <!-- subtle HUD panel -->
  <rect x="86" y="56" width="340" height="400" rx="28" class="panel"></rect>

  <!-- head -->
  <circle cx="256" cy="150" r="72" class="skin"></circle>
  <circle cx="256" cy="150" r="72" class="outline"></circle>

  <!-- visor placeholder -->
  <path d="M205 148c18-26 84-26 102 0" class="accent" fill="none"></path>
  <path d="M214 168c26 18 58 18 84 0" class="accent" fill="none" opacity=".55"></path>

  <!-- body -->
  <path d="M196 232c0-18 16-34 34-34h52c18 0 34 16 34 34v80c0 18-16 34-34 34h-52c-18 0-34-16-34-34z" class="skin"></path>
  <path d="M196 232c0-18 16-34 34-34h52c18 0 34 16 34 34v80c0 18-16 34-34 34h-52c-18 0-34-16-34-34z" class="outline"></path>

  <!-- arms -->
  <path d="M184 244c-18 16-28 40-28 66v26c0 10 8 18 18 18h10" class="outline"></path>
  <path d="M328 244c18 16 28 40 28 66v26c0 10-8 18-18 18h-10" class="outline"></path>

  <!-- legs -->
  <path d="M228 346v64c0 12 10 22 22 22h12c12 0 22-10 22-22v-64" class="skin"></path>
  <path d="M228 346v64c0 12 10 22 22 22h12c12 0 22-10 22-22v-64" class="outline"></path>

  <!-- foot guides -->
  <path d="M210 448h44" class="outline" opacity=".6"></path>
  <path d="M258 448h44" class="outline" opacity=".6"></path>
</svg>