<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Holographic Viewer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { overflow: hidden; background: #000; font-family: 'Courier New', monospace; }
  #canvas-container { width: 100vw; height: 100vh; position: relative; }
  canvas { display: block; }

  #ui-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none;
    z-index: 10;
  }

  .corner-bracket {
    position: absolute;
    width: 40px; height: 40px;
    border-color: rgba(0, 255, 255, 0.5);
    border-style: solid;
  }
  .corner-bracket.tl { top: 20px; left: 20px; border-width: 2px 0 0 2px; }
  .corner-bracket.tr { top: 20px; right: 20px; border-width: 2px 2px 0 0; }
  .corner-bracket.bl { bottom: 20px; left: 20px; border-width: 0 0 2px 2px; }
  .corner-bracket.br { bottom: 20px; right: 20px; border-width: 0 2px 2px 0; }

  #scan-line {
    position: absolute;
    left: 0; width: 100%; height: 2px;
    background: linear-gradient(90deg, transparent, rgba(0,255,255,0.4), transparent);
    top: 0;
    animation: scan 4s linear infinite;
  }
  @keyframes scan {
    0% { top: 0%; opacity: 1; }
    95% { opacity: 1; }
    100% { top: 100%; opacity: 0; }
  }

  #status-panel {
    position: absolute;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    color: rgba(0,255,255,0.8);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(0,255,255,0.6);
  }

  #bottom-bar {
    position: absolute;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    color: rgba(0,255,255,0.5);
    font-size: 10px;
    letter-spacing: 2px;
    text-align: center;
  }

  #loading-msg {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(0,255,255,0.8);
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    display: none;
  }

  .pulse-dot {
    display: inline-block;
    animation: blink 1s infinite;
  }
  .pulse-dot:nth-child(2) { animation-delay: 0.3s; }
  .pulse-dot:nth-child(3) { animation-delay: 0.6s; }
  @keyframes blink { 0%,100%{opacity:0.2} 50%{opacity:1} }

  #grid-overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background-image:
      linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="canvas-container">
  <div id="grid-overlay"></div>
  <canvas id="three-canvas"></canvas>
  <div id="ui-overlay">
    <div id="scan-line"></div>
    <div class="corner-bracket tl"></div>
    <div class="corner-bracket tr"></div>
    <div class="corner-bracket bl"></div>
    <div class="corner-bracket br"></div>
    <div id="status-panel">HOLOGRAPHIC PROJECTION SYSTEM v2.4</div>
    <div id="bottom-bar">
      DRAG TO ROTATE &nbsp;|&nbsp; SCROLL TO ZOOM &nbsp;|&nbsp; RIGHT-DRAG TO PAN
    </div>
  </div>
  <div id="loading-msg">INITIALIZING <span class="pulse-dot">.</span><span class="pulse-dot">.</span><span class="pulse-dot">.</span></div>
</div>

<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const DEFAULT_MODEL = '/assets/avatars/models/epic/default.glb';

/** Floor ring + inner dot + vertical beam. Set false to hide them. */
const ENABLE_RING_AND_BEAM = false;

// ─── SCENE ───────────────────────────────────────────────────────────────────
const canvas = document.getElementById('three-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setClearColor(0x000000, 0);
renderer.sortObjects = true;
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();

// Background gradient via a full-screen quad
const bgGeo = new THREE.PlaneGeometry(2, 2);
const bgMat = new THREE.ShaderMaterial({
  depthWrite: false,
  depthTest: false,
  uniforms: {},
  vertexShader: `
    void main() {
      gl_Position = vec4(position.xy, 1.0, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      vec2 uv = gl_FragCoord.xy / vec2(${window.innerWidth.toFixed(1)}, ${window.innerHeight.toFixed(1)});
      float dist = length(uv - 0.5) * 1.6;
      vec3 center = vec3(0.0, 0.04, 0.07);
      vec3 edge   = vec3(0.0, 0.0, 0.0);
      gl_FragColor = vec4(mix(center, edge, dist), 1.0);
    }
  `
});
const bgMesh = new THREE.Mesh(bgGeo, bgMat);
bgMesh.renderOrder = -1000;
bgMesh.frustumCulled = false;
scene.add(bgMesh);

/** Mind Wars lobby iframe: match lobby --void (#010508), drop teal gradient quad (avoids “grey box”). */
const LOBBY_VOID_HEX = 0x010508;
if (new URLSearchParams(window.location.search).get('embed') === '1') {
  document.body.style.background = '#010508';
  const cc = document.getElementById('canvas-container');
  if (cc) cc.style.background = '#010508';
  const gridOv = document.getElementById('grid-overlay');
  if (gridOv) {
    gridOv.style.backgroundImage =
      'linear-gradient(rgba(0,232,255,.016) 1px, transparent 1px), linear-gradient(90deg, rgba(0,232,255,.016) 1px, transparent 1px)';
    gridOv.style.backgroundSize = '56px 56px';
  }
  scene.remove(bgMesh);
  bgGeo.dispose();
  bgMat.dispose();
  renderer.setClearColor(LOBBY_VOID_HEX, 1);
  const scanEarly = document.getElementById('scan-line');
  if (scanEarly) scanEarly.style.display = 'none';
}

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 100);
camera.position.set(0, 0, 2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.minDistance = 0.5;
controls.maxDistance = 10;
controls.target.set(0, 0, 0);

// Lights (subtle, not dominant)
const ambient = new THREE.AmbientLight(0x00ffff, 0.15);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0x00ffff, 0.3);
dirLight.position.set(1, 2, 2);
scene.add(dirLight);

// ─── HOLOGRAM SHADER ─────────────────────────────────────────────────────────
const holoVertexShader = `
  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec3 vWorldPos;
  varying vec2 vUv;

  void main() {
    vUv = uv;
    vec4 worldPos = modelMatrix * vec4(position, 1.0);
    vWorldPos = worldPos.xyz;
    vNormal = normalize(normalMatrix * normal);
    vec4 mvPos = modelViewMatrix * vec4(position, 1.0);
    vViewDir = normalize(-mvPos.xyz);
    gl_Position = projectionMatrix * mvPos;
  }
`;

const holoFragmentShader = `
  uniform float uTime;
  uniform vec3  uColor;
  uniform float uOpacity;
  uniform float uFresnelStrength;
  uniform float uInnerGlow;
  uniform float uRimStrength;
  uniform float uPulseSpeed;
  uniform float uPulseStrength;
  uniform float uScanSpeed;
  uniform float uScanDensity;
  uniform float uFlickerIntensity;

  varying vec3 vNormal;
  varying vec3 vViewDir;
  varying vec3 vWorldPos;
  varying vec2 vUv;

  void main() {
    // Fresnel edge glow
    float fresnel = 1.0 - max(dot(vNormal, vViewDir), 0.0);
    fresnel = pow(fresnel, uFresnelStrength);

    // Scan lines
    float scanLine = sin(vWorldPos.y * uScanDensity + uTime * uScanSpeed) * 0.5 + 0.5;
    scanLine = pow(scanLine, 3.0) * 0.35 + 0.65;

    // Pulsing energy
    float pulse  = sin(uTime * uPulseSpeed) * 0.5 + 0.5;
    float pulse2 = sin(uTime * uPulseSpeed * 0.4 + vWorldPos.y * 3.0) * 0.5 + 0.5;
    float energy = mix(pulse, pulse2, 0.4);

    // Inner core glow
    float inner = 1.0 - fresnel;
    float core  = pow(inner, 3.5) * uInnerGlow;

    // Rim light boost
    float rim = pow(fresnel, 1.2) * uRimStrength;

    // Combine
    float alpha = (rim + core) * scanLine * (1.0 - uPulseStrength + energy * uPulseStrength);
    alpha = clamp(alpha, 0.0, 1.0);

    // Shimmer flicker
    float flicker = 1.0 - uFlickerIntensity + uFlickerIntensity * sin(uTime * 17.3 + vUv.y * 100.0);
    alpha *= flicker;

    // Color
    vec3 col = uColor * (0.9 + rim * 0.4 + core * 0.5);
    col = clamp(col, 0.0, 3.0);

    gl_FragColor = vec4(col, alpha * uOpacity);
  }
`;

// ─── PROJECTOR BASE RING ──────────────────────────────────────────────────────
const ringGeo   = new THREE.RingGeometry(0.55, 0.85, 64);
const ringMat   = new THREE.MeshBasicMaterial({
  color: 0x00ffff,
  transparent: true,
  opacity: 0.55,
  side: THREE.DoubleSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const ringMesh  = new THREE.Mesh(ringGeo, ringMat);
ringMesh.rotation.x = -Math.PI / 2;
ringMesh.position.y = -1.05;
ringMesh.renderOrder = 5;
if (ENABLE_RING_AND_BEAM) scene.add(ringMesh);

// Inner dot
const dotGeo  = new THREE.CircleGeometry(0.3, 48);
const dotMat  = new THREE.MeshBasicMaterial({
  color: 0x00ffff,
  transparent: true,
  opacity: 0.08,
  side: THREE.DoubleSide,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});
const dotMesh = new THREE.Mesh(dotGeo, dotMat);
dotMesh.rotation.x = -Math.PI / 2;
dotMesh.position.y = -1.06;
dotMesh.renderOrder = 4;
if (ENABLE_RING_AND_BEAM) scene.add(dotMesh);

// Vertical energy beam (cylinder)
const beamGeo = new THREE.CylinderGeometry(0.01, 0.4, 1.1, 32, 1, true);
const beamMat = new THREE.ShaderMaterial({
  transparent: true,
  depthWrite: false,
  side: THREE.DoubleSide,
  blending: THREE.AdditiveBlending,
  uniforms: { uTime: { value: 0 }, uBeamIntensity: { value: 0.18 } },
  vertexShader: `
    varying vec2 vUv;
    void main() {
      vUv = uv;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position,1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    uniform float uBeamIntensity;
    varying vec2 vUv;
    void main() {
      float alpha = (1.0 - vUv.y) * uBeamIntensity;
      alpha *= 0.7 + 0.3 * sin(uTime * 2.0);
      gl_FragColor = vec4(0.0, 1.0, 1.0, alpha);
    }
  `
});
const beamMesh = new THREE.Mesh(beamGeo, beamMat);
beamMesh.position.y = -0.5;
beamMesh.renderOrder = 3;
if (ENABLE_RING_AND_BEAM) scene.add(beamMesh);

// ─── GLOBAL HOLOGRAM STATE ────────────────────────────────────────────────────
const DEFAULTS = {
  colorR: 0.0, colorG: 2.0, colorB: 2.5,
  opacity: 0.82,
  fresnelStrength: 1.8,
  innerGlow: 0.45,
  rimStrength: 1.4,
  pulseSpeed: 1.8,
  pulseStrength: 0.25,
  scanSpeed: 2.5,
  scanDensity: 80.0,
  flickerIntensity: 0.1,
  baseOpacity: 0.15,
  texOpacity: 0.38,
  holoOpacityMul: 1.0,
  ringOpacity: 0.55,
  ringPulseSpeed: 2.2,
  beamIntensity: 0.18,
};
const P = { ...DEFAULTS };

// ─── PRESET SYSTEM ────────────────────────────────────────────────────────────
function getPresetUrl(modelUrl) {
  if (modelUrl.includes('/assets/avatars/models/legendary/')) return '/workflows/legendary-preset.json';
  return '/workflows/epic-preset.json';
}

async function loadPreset(url) {
  const res = await fetch(url);
  if (!res.ok) return;
  const data = await res.json();
  Object.assign(P, data);
  applyP();
}

// ─── MODEL LOAD ───────────────────────────────────────────────────────────────
const shaderUniforms = [];
const baseMeshes  = [];
const texMeshes   = [];
const holoMeshes  = [];
let modelGroup = null;

function applyP() {
  for (const u of shaderUniforms) {
    u.uColor.value.set(P.colorR, P.colorG, P.colorB);
    u.uOpacity.value          = P.opacity * P.holoOpacityMul;
    u.uFresnelStrength.value  = P.fresnelStrength;
    u.uInnerGlow.value        = P.innerGlow;
    u.uRimStrength.value      = P.rimStrength;
    u.uPulseSpeed.value       = P.pulseSpeed;
    u.uPulseStrength.value    = P.pulseStrength;
    u.uScanSpeed.value        = P.scanSpeed;
    u.uScanDensity.value      = P.scanDensity;
    u.uFlickerIntensity.value = P.flickerIntensity;
  }
  for (const m of baseMeshes)  m.material.opacity = P.baseOpacity;
  for (const m of texMeshes)   m.material.opacity = P.texOpacity;
}

function buildHologramLayers(gltf) {
  if (modelGroup) {
    scene.remove(modelGroup);
    modelGroup.traverse(o => {
      if (o.isMesh) {
        o.geometry.dispose();
        if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
        else o.material.dispose();
      }
    });
  }

  shaderUniforms.length = 0;
  baseMeshes.length = 0;
  texMeshes.length  = 0;
  holoMeshes.length = 0;

  modelGroup = new THREE.Group();

  // Auto-center & scale
  const box = new THREE.Box3().setFromObject(gltf.scene);
  const center = new THREE.Vector3();
  box.getCenter(center);
  const size = new THREE.Vector3();
  box.getSize(size);
  const maxDim = Math.max(size.x, size.y, size.z);
  const scale  = 1.6 / maxDim;
  gltf.scene.position.sub(center);
  gltf.scene.scale.setScalar(scale);

  // Position base so ring sits at feet
  const box2 = new THREE.Box3().setFromObject(gltf.scene);
  const center2 = new THREE.Vector3();
  box2.getCenter(center2);
  gltf.scene.position.y -= box2.min.y + 1.05 / scale;

  gltf.scene.updateMatrixWorld(true);

  gltf.scene.traverse(child => {
    if (!child.isMesh) return;

    const origMat = Array.isArray(child.material) ? child.material[0] : child.material;
    const geo     = child.geometry;

    // ── LAYER 1: base volume ──────────────────────────────────────────────────
    const baseMat = new THREE.MeshBasicMaterial({
      color: 0x003333,
      transparent: true,
      opacity: P.baseOpacity,
      depthWrite: false,
    });
    const baseMesh = new THREE.Mesh(geo, baseMat);
    baseMesh.renderOrder = 0;
    baseMesh.applyMatrix4(child.matrixWorld);
    modelGroup.add(baseMesh);
    baseMeshes.push(baseMesh);

    // ── LAYER 2: texture / detail ─────────────────────────────────────────────
    const texMap = origMat?.map ?? null;
    const texMat = new THREE.MeshBasicMaterial({
      map: texMap,
      color: texMap ? 0xffffff : 0x007777,
      transparent: true,
      opacity: texMap ? P.texOpacity : 0.18,
      depthWrite: false,
    });
    const texMesh = new THREE.Mesh(geo, texMat);
    texMesh.renderOrder = 1;
    texMesh.applyMatrix4(child.matrixWorld);
    modelGroup.add(texMesh);
    texMeshes.push(texMesh);

    // ── LAYER 3: hologram shader ──────────────────────────────────────────────
    const uniforms = {
      uTime:             { value: 0 },
      uColor:            { value: new THREE.Vector3(P.colorR, P.colorG, P.colorB) },
      uOpacity:          { value: P.opacity * P.holoOpacityMul },
      uFresnelStrength:  { value: P.fresnelStrength },
      uInnerGlow:        { value: P.innerGlow },
      uRimStrength:      { value: P.rimStrength },
      uPulseSpeed:       { value: P.pulseSpeed },
      uPulseStrength:    { value: P.pulseStrength },
      uScanSpeed:        { value: P.scanSpeed },
      uScanDensity:      { value: P.scanDensity },
      uFlickerIntensity: { value: P.flickerIntensity },
    };
    shaderUniforms.push(uniforms);

    const holoMat = new THREE.ShaderMaterial({
      uniforms,
      vertexShader:   holoVertexShader,
      fragmentShader: holoFragmentShader,
      transparent: true,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
      side:        THREE.FrontSide,
    });
    const holoMesh = new THREE.Mesh(geo, holoMat);
    holoMesh.scale.setScalar(1.002);
    holoMesh.renderOrder = 2;
    holoMesh.applyMatrix4(child.matrixWorld);
    modelGroup.add(holoMesh);
    holoMeshes.push(holoMesh);
  });

  scene.add(modelGroup);
  scene.updateMatrixWorld(true);
  frameCameraToObject(modelGroup);
}

function frameCameraToObject(object) {
  const box = new THREE.Box3().setFromObject(object);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());

  const maxDim = Math.max(size.x, size.y, size.z);
  const fov = camera.fov * (Math.PI / 180);
  let cameraZ = Math.abs(maxDim / 2 / Math.tan(fov / 2));

  cameraZ *= 1.6;

  camera.position.set(center.x, center.y + maxDim * 0.2, cameraZ);
  controls.target.copy(center);

  controls.update();

  camera.near = 0.01;
  camera.far = cameraZ * 10;
  camera.updateProjectionMatrix();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
const loadingMsg = document.getElementById('loading-msg');

async function init() {
  const urlParams = new URLSearchParams(window.location.search);
  const modelUrl = urlParams.get('model') || DEFAULT_MODEL;
  const presetUrl = getPresetUrl(modelUrl);
  const embed = urlParams.get('embed') === '1';
  const replyToken = urlParams.get('reply_token') || '';

  if (embed) {
    const hide = (sel) => {
      const el = document.querySelector(sel);
      if (el) el.style.display = 'none';
    };
    hide('#status-panel');
    hide('#bottom-bar');
    document.querySelectorAll('.corner-bracket').forEach((el) => { el.style.display = 'none'; });
  }

  function notifyParent(status) {
    if (!embed || !replyToken || window.parent === window) return;
    window.parent.postMessage(
      { type: 'mw-hologram', status, reply_token: replyToken },
      window.location.origin
    );
  }

  loadingMsg.style.display = 'block';

  // 1. Load preset
  await loadPreset(presetUrl);

  // 2. Load GLB model
  const dracoLoader = new DRACOLoader();
  dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/');

  const loader = new GLTFLoader();
  loader.setDRACOLoader(dracoLoader);
  loader.load(modelUrl, gltf => {
    buildHologramLayers(gltf);
    loadingMsg.style.display = 'none';
    notifyParent('loaded');
  }, undefined, () => {
    loadingMsg.textContent = 'ERROR LOADING MODEL';
    notifyParent('error');
  });
}

// ─── ANIMATION ───────────────────────────────────────────────────────────────
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const elapsed = clock.getElapsedTime();

  for (const u of shaderUniforms) {
    u.uTime.value = elapsed;
  }

  if (ENABLE_RING_AND_BEAM) {
    ringMat.opacity = P.ringOpacity * (0.8 + 0.2 * Math.sin(elapsed * P.ringPulseSpeed));
    beamMat.uniforms.uTime.value = elapsed;
    beamMat.uniforms.uBeamIntensity.value = P.beamIntensity;
  }

  controls.update();
  renderer.render(scene, camera);
}
animate();

// ─── RESIZE ──────────────────────────────────────────────────────────────────
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

init();
</script>
</body>
</html>
