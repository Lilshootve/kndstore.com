<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIND WARS — Squad Arena 3v3</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/*══════════════════════════════════════════════════════════════════
  RESET & ROOT — canonical KND palette from mind-wars-arena.php
══════════════════════════════════════════════════════════════════*/
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#010408;--deep:#030a10;--surface:#05111a;--surface2:#071520;
  --c:#00f0ff;--c2:#00a8bb;--cg:rgba(0,240,255,.14);--cb:rgba(0,240,255,.22);
  --m:#d400ff;--mg:rgba(212,0,255,.14);--mb:rgba(212,0,255,.28);
  --gold:#ffc820;--red:#ff2244;--green:#00ff88;--orange:#ff8800;
  --t1:rgba(220,245,255,.93);--t2:rgba(150,210,230,.6);--t3:rgba(90,160,185,.38);--t4:rgba(60,120,145,.2);
  --FD:'Orbitron',monospace;--FB:'Rajdhani',sans-serif;--FM:'Share Tech Mono',monospace;
  /* Rarity */
  --r-common:#4a7a8a;--r-special:#1aaa6a;--r-rare:#1a6aee;--r-epic:#c040ff;--r-legendary:#ffc030;
  /* Ability types */
  --t-passive:#4a9aff;--t-ability:#00f0ff;--t-special:#d400ff;--t-heal:#20e080;--t-attack:#ff4060;--t-defense:#40c0ff;
}
html,body{height:100%;overflow:hidden}
body{background:var(--void);color:var(--t1);font-family:var(--FB);cursor:default;user-select:none}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 3px)}

#app{width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/*══════════════════════════════════════════════════════════════════
  LOBBY TOPBAR (injected by battlefield.php) + turn / round strip
══════════════════════════════════════════════════════════════════*/
header.topbar{flex-shrink:0}
#battle-hud-strip{
  display:flex;align-items:center;justify-content:center;
  padding:6px 16px;
  background:linear-gradient(180deg,rgba(1,4,8,.92),rgba(1,4,8,.75));
  border-bottom:1px solid rgba(0,240,255,.08);
  min-height:36px;z-index:19;flex-shrink:0;position:relative;
}
#battle-hud-strip::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--c) 30%,var(--m) 50%,var(--c) 70%,transparent 95%);opacity:.22}
.bhs-center{display:flex;flex-direction:column;align-items:center;gap:2px}
#tl{font-family:var(--FD);font-size:11px;font-weight:900;letter-spacing:5px;text-shadow:0 0 18px rgba(0,240,255,.4)}
#rl{font-family:var(--FM);font-size:8px;letter-spacing:2px;color:var(--t3);margin-top:1px}

/*══════════════════════════════════════════════════════════════════
  ARENA VIEWPORT — Three.js canvas (squad-arena style HUD)
══════════════════════════════════════════════════════════════════*/
#arena{flex:1;position:relative;overflow:hidden;min-height:0}
#canvas-container{position:absolute;inset:0;z-index:0;overflow:hidden}
#three-container{position:absolute;inset:0;z-index:1;overflow:hidden;background:#000}
#three-canvas{width:100%;height:100%;display:block;touch-action:none}
#mw-floating-pops{position:absolute;inset:0;pointer-events:none;z-index:12;overflow:hidden}
.mw-dp{position:absolute;transform:translate(-50%,-50%);z-index:100;font-family:var(--FD);font-weight:900;letter-spacing:2px;pointer-events:none;white-space:nowrap}
.mw-dp.damage{color:var(--red);font-size:22px;text-shadow:0 0 10px rgba(255,34,68,.6),0 2px 4px #000;animation:fUp 1.15s ease-out forwards}
.mw-dp.crit{color:var(--gold);font-size:28px;text-shadow:0 0 14px rgba(255,200,32,.7),0 2px 4px #000;animation:fUpCrit 1.2s ease-out forwards}
.mw-dp.heal{color:var(--green);font-size:18px;text-shadow:0 0 8px rgba(0,255,136,.5);animation:fUp 1.15s ease-out forwards}
.mw-dp.miss{color:var(--t2);font-size:14px;font-family:var(--FM);letter-spacing:3px;animation:fUp 1.15s ease-out forwards}
.mw-dp.block{color:var(--c);font-size:14px;animation:fUp 1.15s ease-out forwards}
#mw-arena-hud{position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:10}
#mw-round-banner{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.72);border:1px solid rgba(0,240,255,.35);padding:4px 18px;font-family:var(--FM);font-size:9px;letter-spacing:3px;color:var(--c);display:none}
/* ── FLOATING HP BARS (projected over 3D models) ── */
#mw-hp-overlay{position:absolute;inset:0;pointer-events:none;z-index:13;overflow:hidden}
.mw-hp-float{position:absolute;transform:translate(-50%,0);display:flex;flex-direction:column;align-items:center;gap:1px;transition:left .1s,top .1s}
.mw-hp-float-name{font-family:var(--FD);font-size:8px;font-weight:700;letter-spacing:1.5px;color:rgba(220,240,255,.9);text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(0,240,255,.2);white-space:nowrap}
.mw-hp-float-name.enemy{color:rgba(255,200,220,.9);text-shadow:0 1px 4px rgba(0,0,0,.9),0 0 8px rgba(212,0,255,.2)}
.mw-hp-float-track{width:90px;height:7px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.12);border-radius:1px;overflow:hidden;position:relative}
.mw-hp-float-fill{height:100%;transition:width .4s cubic-bezier(.2,.8,.2,1);border-radius:0}
.mw-hp-float-fill.player{background:linear-gradient(90deg,#0088ff,#00ddff);box-shadow:inset 0 -1px 0 rgba(0,0,0,.3),0 0 6px rgba(0,200,255,.3)}
.mw-hp-float-fill.enemy{background:linear-gradient(90deg,#ff3344,#ff7744);box-shadow:inset 0 -1px 0 rgba(0,0,0,.3),0 0 6px rgba(255,60,80,.3)}
.mw-hp-float-fill.low{background:linear-gradient(90deg,#ff8800,#ffcc00)!important;box-shadow:inset 0 -1px 0 rgba(0,0,0,.3),0 0 8px rgba(255,150,0,.4)!important}
.mw-hp-float-fill.crit{background:linear-gradient(90deg,#ff0022,#ff3344)!important;animation:hpCritPulse .8s ease-in-out infinite!important}
@keyframes hpCritPulse{0%,100%{box-shadow:0 0 4px rgba(255,0,30,.4)}50%{box-shadow:0 0 12px rgba(255,0,30,.8)}}
.mw-hp-float-nums{font-family:var(--FM);font-size:7px;color:rgba(200,220,255,.65);letter-spacing:.5px;text-shadow:0 1px 3px rgba(0,0,0,.8)}

/* ── CORNER HP BARS (secondary, semi-transparent — floating bars are primary) ── */
.mw-hp-bar-group{position:absolute;display:flex;flex-direction:column;gap:5px;pointer-events:none;opacity:0.5}
#mw-player-bars{bottom:12px;left:10px}
#mw-enemy-bars{bottom:12px;right:10px;align-items:flex-end}
.mw-unit-hp-block{display:flex;flex-direction:column;gap:2px}
.mw-unit-hp-block.enemy{align-items:flex-end}
.mw-unit-name-tag{font-family:var(--FM);font-size:7px;letter-spacing:1.2px;color:rgba(200,220,255,.75)}
.mw-unit-name-tag.enemy{color:rgba(255,150,180,.75)}
.mw-hp-track{width:108px;height:5px;background:rgba(255,255,255,.08);border-radius:0;overflow:hidden;position:relative}
.mw-hp-fill{height:100%;transition:width .45s ease;position:relative}
.mw-hp-fill.player{background:linear-gradient(90deg,#0088ff,#00ddff)}
.mw-hp-fill.enemy{background:linear-gradient(90deg,#ff4444,#ff8800)}
.mw-hp-fill.enemy.low{background:linear-gradient(90deg,#ff8800,#ffcc00)}
.mw-hp-nums{font-family:var(--FM);font-size:7px;color:rgba(200,220,255,.45);letter-spacing:.5px}
.mw-hp-nums.enemy{text-align:right}
#mw-center-fx{position:absolute;top:46%;left:50%;transform:translate(-50%,-50%);pointer-events:none;text-align:center}
#mw-dmg-number{font-size:0;color:#ff4444;font-weight:700;letter-spacing:2px;transition:all .1s;text-shadow:0 0 10px rgba(255,68,68,.8);opacity:0;font-family:var(--FD)}
#mw-flash-overlay{position:absolute;top:0;left:0;right:0;bottom:0;background:#fff;opacity:0;pointer-events:none;z-index:20}
#mw-cinematic-bars-top{position:absolute;top:0;left:0;right:0;height:0;background:#000;transition:height .3s ease;z-index:15}
#mw-cinematic-bars-bot{position:absolute;bottom:0;left:0;right:0;height:0;background:#000;transition:height .3s ease;z-index:15}
#mw-ability-caption{position:absolute;bottom:44px;left:50%;transform:translateX(-50%);opacity:0;text-align:center;transition:opacity .3s;pointer-events:none}
#mw-ability-name{font-family:var(--FD);font-size:13px;letter-spacing:3px;color:#fff;font-weight:700}
#mw-ability-sub{font-family:var(--FM);font-size:8px;letter-spacing:2px;color:rgba(255,200,0,.85);margin-top:2px}

/* BG */
#abg{position:absolute;inset:0;z-index:0}
.abg-sky{position:absolute;inset:0;background:linear-gradient(180deg,#080c18 0%,#0d1525 30%,#14213d 55%,#1a1a3e 70%,#1e1530 100%)}
.abg-stars{position:absolute;inset:0}.abg-hz{position:absolute;top:24%;left:0;right:0;height:26%;
  background:linear-gradient(180deg,rgba(160,90,40,.06),rgba(0,180,255,.025),transparent)}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:var(--p,.65)}}

/* Floor */
#afl{position:absolute;bottom:0;left:50%;width:150%;transform:translateX(-50%);height:60%;perspective:520px;z-index:1}
#afp{width:100%;height:100%;transform:rotateX(55deg);transform-origin:bottom center;position:relative}
#afg{position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,240,255,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(0,240,255,.05) 1px,transparent 1px);
  background-size:52px 52px;mask-image:radial-gradient(ellipse 62% 82% at 50% 55%,black 12%,transparent 72%)}
#afglow{position:absolute;inset:0;background:radial-gradient(ellipse 42% 50% at 50% 48%,rgba(0,240,255,.045),transparent 60%)}

/* Ring */
#aring{position:absolute;bottom:5%;left:50%;transform:translateX(-50%);width:80%;height:0;padding-bottom:30%;z-index:2;pointer-events:none}
#aring::before{content:'';position:absolute;inset:0;border:1px solid rgba(0,240,255,.1);border-radius:50%;
  box-shadow:0 0 22px rgba(0,240,255,.04),inset 0 0 22px rgba(0,240,255,.02);animation:rpl 4s ease-in-out infinite}
@keyframes rpl{0%,100%{opacity:.35}50%{opacity:.8}}

/* Command frame */
#cfr{position:absolute;inset:0;z-index:10;pointer-events:none}
.fe{position:absolute;pointer-events:auto}
.fe.l{left:0;top:0;bottom:0;width:50px;background:linear-gradient(to right,rgba(3,16,28,.94),rgba(3,16,28,.4),transparent)}
.fe.r{right:0;top:0;bottom:0;width:50px;background:linear-gradient(to left,rgba(3,16,28,.94),rgba(3,16,28,.4),transparent)}
.fpn{position:absolute;width:36px;height:65px;background:rgba(3,16,28,.9);border:1px solid rgba(0,240,255,.09);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:2px}
.fpn.tl{left:6px;top:40px}.fpn.bl{left:6px;bottom:40px}.fpn.tr{right:6px;top:40px}.fpn.br{right:6px;bottom:40px}
.fl{width:6px;height:6px;border-radius:1px;box-shadow:0 0 5px currentColor}
.fl.cy{background:var(--c);color:var(--c)}.fl.or{background:var(--orange);color:var(--orange)}
.fl.gn{background:var(--green);color:var(--green)}.fl.off{background:rgba(60,80,100,.1);color:transparent;box-shadow:none}
.fb{position:absolute;height:2px;background:linear-gradient(90deg,var(--c),var(--m),var(--c));border-radius:1px;
  box-shadow:0 0 6px rgba(0,240,255,.2);animation:fbp 3s ease-in-out infinite}
.fb.ftl{top:10px;left:52px;width:90px}.fb.ftr{top:10px;right:52px;width:90px}
@keyframes fbp{0%,100%{opacity:.3}50%{opacity:.8}}

/*══════════════════════════════════════════════════════════════════
  UNIT PLATFORMS
══════════════════════════════════════════════════════════════════*/
#units{position:absolute;inset:0;z-index:5}
.up{position:absolute;display:flex;flex-direction:column;align-items:center;transform:translate(-50%,-50%);
  transition:all .4s cubic-bezier(.2,.8,.2,1);cursor:pointer;z-index:5}
.up:hover{z-index:8}
.up.dead{opacity:.15;pointer-events:none;filter:grayscale(1) brightness(.4)}
.up.tgt .pb{box-shadow:0 0 26px rgba(255,34,68,.5);border-color:rgba(255,34,68,.5)}
.up.tgt .pb::after{background:rgba(255,34,68,.06)}
.up.act .uf{animation:abounce .5s ease}
@keyframes abounce{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-14px) scale(1.1)}100%{transform:translateY(0) scale(1)}}
.up.sel .pb{border-color:var(--c);box-shadow:0 0 26px rgba(0,240,255,.35)}
/* Arena shake from arena.php */
.up.shaking{animation:shake .44s cubic-bezier(.36,.07,.19,.97)!important}
@keyframes shake{0%,100%{transform:translate(-50%,-50%) translateX(0)}15%{transform:translate(-50%,-50%) translateX(-7px)}30%{transform:translate(-50%,-50%) translateX(7px)}45%{transform:translate(-50%,-50%) translateX(-4px)}60%{transform:translate(-50%,-50%) translateX(4px)}75%{transform:translate(-50%,-50%) translateX(-2px)}}
/* Death from arena.php */
.up.dying{animation:holoDie 1.2s ease forwards!important}
@keyframes holoDie{0%{opacity:1;filter:brightness(1)}20%{filter:brightness(2.8) saturate(4) hue-rotate(30deg)}50%{opacity:.5;filter:brightness(.4) blur(2px) saturate(0)}100%{opacity:.08;filter:brightness(.1) blur(5px) saturate(0)}}

/* Hex platform */
.pb{width:110px;height:32px;position:relative;border:1px solid rgba(0,240,255,.2);
  background:linear-gradient(180deg,rgba(0,240,255,.06),rgba(0,240,255,.012));
  clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  box-shadow:0 0 16px rgba(0,240,255,.1);transition:all .3s}
.pb::before{content:'';position:absolute;inset:2px;clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  background:repeating-linear-gradient(90deg,rgba(0,240,255,.03) 0px,transparent 1px,transparent 7px)}
.pb::after{content:'';position:absolute;inset:0;clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  background:rgba(0,240,255,.025);animation:pg 3s ease-in-out infinite;transition:background .3s}
@keyframes pg{0%,100%{opacity:.4}50%{opacity:1}}
.pb.ep{border-color:rgba(212,0,255,.16);background:linear-gradient(180deg,rgba(212,0,255,.04),rgba(212,0,255,.008));box-shadow:0 0 12px rgba(212,0,255,.07)}
.pb.ep::before{background:repeating-linear-gradient(90deg,rgba(212,0,255,.02) 0px,transparent 1px,transparent 7px)}
.pb.ep::after{background:rgba(212,0,255,.02)}

.uf{position:relative;display:flex;flex-direction:column;align-items:center;margin-bottom:-2px;transition:transform .3s}
.up:hover .uf{transform:translateY(-5px)}
.uf-i{font-size:42px;filter:drop-shadow(0 0 14px rgba(0,240,255,.3));line-height:1;animation:ufl 4s ease-in-out infinite}
.uf-i .uf-img{width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid rgba(0,240,255,.2);display:block}
.es .uf-i{filter:drop-shadow(0 0 14px rgba(212,0,255,.22))}
@keyframes ufl{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.hb{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:2px;height:26px;
  background:linear-gradient(0deg,rgba(0,240,255,.22),transparent);filter:blur(1px);pointer-events:none}
.es .hb{background:linear-gradient(0deg,rgba(212,0,255,.14),transparent)}

/* Unit HUD */
.uh{display:flex;flex-direction:column;align-items:center;gap:1px;margin-bottom:2px;min-width:100px}
.upos{font-family:var(--FD);font-size:6px;font-weight:700;letter-spacing:2px;padding:1px 5px;border:1px solid;margin-bottom:1px}
.upos.front{color:#ff6644;border-color:rgba(255,102,68,.28)}.upos.mid{color:var(--gold);border-color:rgba(255,200,32,.28)}
.upos.back{color:var(--c);border-color:rgba(0,240,255,.28)}
.unm{font-family:var(--FD);font-size:7.5px;font-weight:700;letter-spacing:1.5px;color:var(--t1);text-shadow:0 1px 3px rgba(0,0,0,.9);white-space:nowrap}
.ucl{font-family:var(--FM);font-size:6px;letter-spacing:.8px;color:var(--t3)}
.uhp{width:82px;display:flex;flex-direction:column;gap:1px}
.uhpb{height:5px;background:rgba(0,0,0,.5);border:1px solid rgba(0,240,255,.1);overflow:hidden}
.uhpf{height:100%;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.uhpf.al{background:linear-gradient(90deg,#00cc55,#00ff99);box-shadow:0 0 6px rgba(0,255,136,.3)}
.uhpf.en{background:linear-gradient(90deg,#cc0022,#ff2244);box-shadow:0 0 6px rgba(255,30,60,.3)}
.uhpf.warn{background:linear-gradient(90deg,#ff6600,#ff9900)!important;box-shadow:0 0 6px rgba(255,120,0,.3)!important}
.uhpf.crit{background:linear-gradient(90deg,#cc0022,#ff2244)!important;animation:critF .9s ease-in-out infinite!important}
@keyframes critF{0%,100%{box-shadow:0 0 6px rgba(255,30,60,.3)}50%{box-shadow:0 0 16px rgba(255,30,60,.65)}}
.uhpt{font-family:var(--FM);font-size:6.5px;color:var(--t2);text-align:center;text-shadow:0 0 3px rgba(0,0,0,.8)}

/* Damage popups — from arena fnum */
.dp{position:absolute;top:-10px;left:50%;transform:translateX(-50%);z-index:100;
  font-family:var(--FD);font-weight:900;letter-spacing:2px;pointer-events:none;white-space:nowrap}
.dp.damage{color:var(--red);font-size:22px;text-shadow:0 0 10px rgba(255,34,68,.6),0 2px 4px #000;animation:fUp 1.15s ease-out forwards}
.dp.crit{color:var(--gold);font-size:28px;text-shadow:0 0 14px rgba(255,200,32,.7),0 2px 4px #000;animation:fUpCrit 1.2s ease-out forwards}
.dp.heal{color:var(--green);font-size:18px;text-shadow:0 0 8px rgba(0,255,136,.5);animation:fUp 1.15s ease-out forwards}
.dp.miss{color:var(--t2);font-size:14px;font-family:var(--FM);letter-spacing:3px;animation:fUp 1.15s ease-out forwards}
.dp.block{color:var(--c);font-size:14px;animation:fUp 1.15s ease-out forwards}
@keyframes fUp{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}15%{transform:translateX(-50%) translateY(-14px) scale(1.15)}100%{opacity:0;transform:translateX(-50%) translateY(-70px) scale(.7)}}
@keyframes fUpCrit{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1) rotate(-3deg)}10%{transform:translateX(-50%) translateY(-10px) scale(1.35) rotate(2deg)}25%{transform:translateX(-50%) translateY(-22px) scale(1.45) rotate(-1deg)}100%{opacity:0;transform:translateX(-50%) translateY(-90px) scale(.6) rotate(0)}}

/* Screen flash from arena */
#sf{position:fixed;inset:0;z-index:500;pointer-events:none;opacity:0;background:rgba(255,30,50,.12);transition:opacity .06s}
#sf.pop{opacity:1;transition:none}

/*══════════════════════════════════════════════════════════════════
  COMBAT LOG — right sidebar
══════════════════════════════════════════════════════════════════*/
#clog{position:absolute;top:8px;right:56px;width:185px;z-index:15;pointer-events:none;display:flex;flex-direction:column;gap:2px}
.cle{padding:3px 7px;font-family:var(--FB);font-size:12px;font-weight:600;letter-spacing:.3px;color:var(--t2);line-height:1.3;
  background:rgba(1,4,8,.82);border-left:2px solid var(--c);backdrop-filter:blur(5px);animation:cli .22s ease both}
@keyframes cli{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.cle .trn{font-family:var(--FM);font-size:8px;color:var(--t3);margin-right:5px}
.cle.pa{color:rgba(175,248,255,.9);border-left-color:var(--c)}.cle.pa .actor{color:var(--c)}
.cle.ea{color:rgba(238,210,255,.9);border-left-color:var(--m)}.cle.ea .actor{color:var(--m)}
.cle .dt{color:var(--red);font-weight:700}.cle .ht{color:var(--green);font-weight:700}
.cle .ct{color:var(--gold);font-family:var(--FD);font-size:10px}
.cle.sys{color:var(--t3);font-style:italic;border-left-color:rgba(0,240,255,.3)}

/*══════════════════════════════════════════════════════════════════
  BOTTOM — tools/cards .avatar-card (row-span 2) + 2×2 skill tiles
══════════════════════════════════════════════════════════════════*/
#ability-hud{--ahsq:min(118px,12vw);z-index:20;flex-shrink:0;border-top:1px solid rgba(0,240,255,.1);
  background:linear-gradient(0deg,rgba(1,4,8,.97) 60%,rgba(1,4,8,.88));backdrop-filter:blur(14px);position:relative;
  display:flex;flex-direction:column;min-height:0}
#ability-hud::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--c) 25%,var(--m) 50%,var(--c) 75%,transparent 95%);opacity:.2}

#apanel{z-index:1;flex:1;min-height:0;position:relative;

.pu-pack>.skc:nth-child(3){grid-column:3;grid-row:1}
.pu-pack>.skc:nth-child(4){grid-column:4;grid-row:1}
.pu-pack>.skc:nth-child(5){grid-column:2;grid-row:2}
.pu-pack>.skc:nth-child(6){grid-column:3;grid-row:2}
.pu-pack>.skc:nth-child(7){grid-column:4;grid-row:2}

function safeAttrUrl(s){
  const t=String(s==null?'':s).trim();
  if(!t||/^javascript:/i.test(t))return'';
  return t.replace(/"/g,'');
}
function normalizeUnitForBattle(u,isEnemySlot){
  const o={...u,isEnemy:u.isEnemy!=null?!!u.isEnemy:!!isEnemySlot};
  if(o.image==null)o.image='';
  if(o.modelGlb==null)o.modelGlb='';
  if(o.icon==null)o.icon='◆';
  if(o.level==null)o.level=1;
  ['mind','focus','speed','luck'].forEach(k=>{if(o[k]!=null)o[k]=Math.round(Number(o[k])||0)});
  return o;
}

/* ── STATE (var: Three.js arena + pick-target need global G) ── */
var G={round:1,turn:'player',phase:'select',dd:0,dt:0,allies:[],enemies:[],actions:{},pendingPickEnemy:null};

/* ── PHP-MATCHING DAMAGE CALC ── */
function calcDmg(atk,def,mult=1.0,ignoreDef=false){
  const base=(atk.mind*2)+4+Math.floor(Math.random()*5);
  const red=ignoreDef?0:def.focus*MW.FOCUS_RED;
  /* Apply synergy damage bonus */
  var synergyMult = window.MWArenaStatus ? MWArenaStatus.getSynergyDmgMultiplier(atk) : 1;
  let dmg=Math.max(1,Math.round((base-red)*mult*synergyMult));
  /* Apply synergy crit bonus */
  var synergyCrit = window.MWArenaStatus ? MWArenaStatus.getSynergyCritBonus(atk) : 0;
  const critCh=Math.min((atk.luck*2)/100+synergyCrit,MW.CRIT_CAP);
  const crit=Math.random()<=critCh;
  if(crit)dmg=Math.round(dmg*MW.CRIT_MULT);
  const evCh=Math.min((def.speed*MW.EVADE_RATIO)/100,MW.EVADE_CAP);
  const evaded=Math.random()<=evCh;
  if(evaded)dmg=0;
  if(def.defending)dmg=Math.round(dmg*MW.DEFEND_MULT);
  if(def.passiveData?.dmgReduction&&dmg>0)dmg=Math.round(dmg*(1-def.passiveData.dmgReduction));
  /* Apply synergy team damage reduction */
  var synergyDR = window.MWArenaStatus ? MWArenaStatus.getSynergyDmgReduction(def) : 0;
  if(synergyDR>0&&dmg>0)dmg=Math.round(dmg*(1-synergyDR));
  return{damage:Math.max(0,dmg),crit,evaded};
}
function calcHp(lvl){return MW.HP_BASE+(Math.max(1,lvl)*MW.HP_PER_LVL)}
/** PHP bootstrap may send maxHp (mw_calc_hp + Tank hp_flat_bonus); else derive from level. */
function resolveUnitHp(x){
  const m=x&&x.maxHp;
  if(m!=null&&Number.isFinite(Number(m)))return Math.max(1,Math.round(Number(m)));
  return calcHp(x.level);
}

/* ── INIT ── */
function init(){
  const boot=window.__MW_BATTLE_INIT__;
  const srcA=(boot&&Array.isArray(boot.allies)&&boot.allies.length)?boot.allies:DEMO_AS;
  const srcE=(boot&&Array.isArray(boot.enemies)&&boot.enemies.length)?boot.enemies:DEMO_ES;
  G.allies=srcA.map(u=>{
    const x=normalizeUnitForBattle(u,false);
    const hp=resolveUnitHp(x);
    return{...x,abilities:x.abilities.map(a=>({...a})),hp,maxHp:hp,energy:MW.E_START,defending:false,
      passiveData:x.abilities.find(a=>a.passive)||{}};
  });
  G.enemies=srcE.map(u=>{
    const x=normalizeUnitForBattle(u,true);
    const hp=resolveUnitHp(x);
    return{...x,abilities:x.abilities.map(a=>({...a})),hp,maxHp:hp,energy:MW.E_START,defending:false,
      passiveData:x.abilities.find(a=>a.passive)||{}};
  });
  G.actions={};
  G.pendingPickEnemy=null;

  // ── VS INTRO SCREEN ──
  showVsIntro().then(function(){
    renderUnits();buildHUD();updateConfirm();
    showPh('ROUND 1 — FIGHT');
    lg('Neural link established. Battle begins!','sys');
    if(window.MWArenaSFX){MWArenaSFX.unlock();MWArenaSFX.playRoundStart();MWArenaSFX.startMusic();}
  });
}

function showVsIntro(){
  return new Promise(function(resolve){
    var vsEl=document.getElementById('vs-intro');
    if(!vsEl){resolve();return;}
    var leftBox=document.getElementById('vs-allies');
    var rightBox=document.getElementById('vs-enemies');
    if(leftBox) G.allies.forEach(function(u){
      var d=document.createElement('div');
      d.style.cssText='font-family:var(--FD);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--t1);text-shadow:0 0 10px rgba(0,240,255,.3);';
      d.textContent=(u.name||'UNIT').toUpperCase();
      var s=document.createElement('div');
      s.style.cssText='font-family:var(--FM);font-size:9px;letter-spacing:2px;color:var(--t3);';
      s.textContent=(u.class||'')+' · LV '+(u.level||1)+' · '+(u.rarity||'common').toUpperCase();
      leftBox.appendChild(d);leftBox.appendChild(s);
    });
    if(rightBox) G.enemies.forEach(function(u){
      var d=document.createElement('div');
      d.style.cssText='font-family:var(--FD);font-size:13px;font-weight:700;letter-spacing:3px;color:var(--t1);text-shadow:0 0 10px rgba(212,0,255,.3);';
      d.textContent=(u.name||'ENEMY').toUpperCase();
      var s=document.createElement('div');
      s.style.cssText='font-family:var(--FM);font-size:9px;letter-spacing:2px;color:var(--t3);';
      s.textContent=(u.class||'')+' · LV '+(u.level||1)+' · '+(u.rarity||'common').toUpperCase();
      rightBox.appendChild(d);rightBox.appendChild(s);
    });
    // Animate in
    requestAnimationFrame(function(){
      var left=document.getElementById('vs-left');
      var right=document.getElementById('vs-right');
      var badge=document.getElementById('vs-badge');
      if(left){left.style.transform='translateX(0)';left.style.opacity='1';}
      if(right){right.style.transform='translateX(0)';right.style.opacity='1';}
      if(badge) badge.style.transform='scale(1)';
    });
    // Hold, then fade out
    setTimeout(function(){
      vsEl.style.opacity='0';
      setTimeout(function(){
        vsEl.style.display='none';
        resolve();
      },600);
    },2200);
  });
}

function buildHUD(){

/* ── SELECT ABILITY ── */
function selectAbility(unit,ab){
  if(G.actions[unit.id]===ab){delete G.actions[unit.id]}
  else{
    G.actions[unit.id]=ab;
    if(window.MWArenaSFX)MWArenaSFX.playSelect();

      G.pendingPickEnemy=null;

/* ── CONFIRM PANEL ── */
function updateConfirm(){
  const slots=document.getElementById('confirm-slots');slots.innerHTML='';

  aliveAllies.forEach(u=>{

/* ── EXECUTE TURN ── */
async function executeTurn(){
  const alive=G.allies.filter(a=>a.hp>0);
  if(!alive.every(u=>G.actions[u.id])||G.phase!=='select')return;
  G.phase='anim';document.getElementById('send-btn').classList.remove('rdy');
  if(window.MWArenaSFX)MWArenaSFX.playConfirm();
  G.pendingPickEnemy=null;
  if(window.MWArenaThree)MWArenaThree.setEnemyPickMode(false);

  // Sort by speed (fastest first)
  const order=[...alive].sort((a,b)=>b.speed-a.speed);
  for(const u of order){
    const ab=G.actions[u.id];if(!ab||u.hp<=0)continue;
    await sl(200);
    if(ab.healPct)await doHeal(u,ab);
    else if(ab.defend===true||ab.type==='defense'||ab.type==='defend'){
      u.defending=true;
      if(window.MWArenaThree)await MWArenaThree.playDefendVisual(u,'player');
      lg(`<span class="actor">${u.name}</span> <span class="ht">DEFENDS</span> — reduced incoming damage this round`,'pa');
    }else await doAtk(u,ab);
    if(ab.maxCd>0)ab.cd=ab.maxCd;
    const pay=ab.eCost!==undefined&&ab.eCost!==null?Number(ab.eCost):0;
    u.energy=Math.min(MW.MAX_ENERGY,u.energy-pay+MW.E_GAIN_ATK);
    await sl(200);
    renderUnits();
    if(checkEnd())return;
  }
  // Reduce ally CDs
  G.allies.forEach(a=>a.abilities.forEach(s=>{if(s.cd>0)s.cd--}));
  G.actions={};
  G.enemies.forEach(e=>{e.defending=false});
  if(checkEnd())return;

  // Enemy turn
  G.turn='enemy';G.phase='enemy';
  document.getElementById('tl').textContent="ENEMY TURN";document.getElementById('tl').style.color='var(--m)';
  await sl(280);await aiTurn();await sl(120);
  if(checkEnd())return;

  // New round
  G.round++;G.turn='player';G.phase='select';
  document.getElementById('tl').textContent='YOUR TURN';document.getElementById('tl').style.color='var(--c)';
  document.getElementById('rl').textContent='ROUND '+G.round;
  showPh('ROUND '+G.round);
  if(window.MWArenaSFX)MWArenaSFX.playRoundStart();
  G.enemies.forEach(a=>a.abilities.forEach(s=>{if(s.cd>0)s.cd--}));
  // Energy regen
  G.allies.forEach(u=>{if(u.hp>0)u.energy=Math.min(MW.MAX_ENERGY,u.energy+1)});
  G.enemies.forEach(u=>{if(u.hp>0)u.energy=Math.min(MW.MAX_ENERGY,u.energy+1)});
  renderUnits();buildHUD();updateConfirm();
}

/* ── ATTACK ── */
async function doAtk(atk,ab){
  let targets=[];
  if(ab.target==='all')targets=G.enemies.filter(e=>e.hp>0);
  else if(ab.target==='any'){
    const pool=G.enemies.filter(e=>e.hp>0);
    const picked=G.pendingPickEnemy&&pool.some(e=>e.id===G.pendingPickEnemy.id)?G.pendingPickEnemy:null;
    targets=[picked||pool.sort((a,b)=>a.hp-b.hp)[0]].filter(Boolean);
  }
  else targets=getValidTargets(atk,G.enemies);
  if(!targets.length)return;

  const AX=window.MWArenaThree;
  const specAll=ab.target==='all'&&String(ab.type||'').toLowerCase()==='special'&&AX;

  if(specAll){
    const packs=[];
    for(const t of targets){
      packs.push({t,r:calcDmg(atk,t,ab.dmg||1.0,ab.ignoreDef)});
    }
    for(const {t,r} of packs){
      if(r.evaded){
        if(AX){AX.flashUnitById(t.id);AX.popOnUnit(t.id,'EVADE','miss')}
        lg(`<span class="actor">${atk.name}</span> → ${t.name}: <span class="ct">EVADE</span>`,'pa');
      }else if(r.damage===0){
        if(AX){AX.flashUnitById(t.id);AX.popOnUnit(t.id,'BLOCK','block')}
        lg(`<span class="actor">${atk.name}</span> → ${t.name}: BLOCKED`,'pa');
      }else{
        t.hp=Math.max(0,t.hp-r.damage);G.dd+=r.damage;
        screenFlash();
        lg(`<span class="actor">${atk.name}</span> → ${t.name}: <span class="dt">-${r.damage}</span>${r.crit?' <span class="ct">CRIT!</span>':''}`,'pa');
        if(ab.lifesteal&&r.damage>0){const h=Math.round(r.damage*ab.lifesteal);atk.hp=Math.min(atk.maxHp,atk.hp+h);if(AX)AX.popOnUnit(atk.id,'+'+h,'heal')}
      }
    }
    renderUnits();
    const hitPacks=packs.filter(x=>!x.r.evaded&&x.r.damage>0);
    if(hitPacks.length&&AX)await AX.playSpecialAoeVisual(atk,ab,hitPacks,'player');
    for(const {t,r} of packs){
      if(!r.evaded&&r.damage>0&&t.hp<=0&&AX)await AX.maybeDeathAnim(t,'enemy');
      if(t.hp<=0){
        lg(`${t.name} has been <span class="dt">ELIMINATED</span>!`,'sys');
        if(window.MWArenaStatus)MWArenaStatus.onKill(G.allies,atk);
      }
    }
    renderUnits();
    return;
  }

  for(const t of targets){
    const r=calcDmg(atk,t,ab.dmg||1.0,ab.ignoreDef);
    if(AX)AX.flashUnitById(t.id);await sl(120);
    if(r.evaded){
      if(AX)AX.popOnUnit(t.id,'EVADE','miss');
      lg(`<span class="actor">${atk.name}</span> → ${t.name}: <span class="ct">EVADE</span>`,'pa');
    }
    else if(r.damage===0){
      if(AX)AX.popOnUnit(t.id,'BLOCK','block');
      lg(`<span class="actor">${atk.name}</span> → ${t.name}: BLOCKED`,'pa');
    }
    else{
      t.hp=Math.max(0,t.hp-r.damage);G.dd+=r.damage;
      screenFlash();
      renderUnits();
      if(AX)await AX.playAttackVisual(atk,t,ab,r,'player');
      lg(`<span class="actor">${atk.name}</span> → ${t.name}: <span class="dt">-${r.damage}</span>${r.crit?' <span class="ct">CRIT!</span>':''}`,'pa');
      if(ab.lifesteal&&r.damage>0){const h=Math.round(r.damage*ab.lifesteal);atk.hp=Math.min(atk.maxHp,atk.hp+h);if(AX)AX.popOnUnit(atk.id,'+'+h,'heal')}
      if(t.hp<=0){
        if(AX)await AX.maybeDeathAnim(t,'enemy');
        lg(`${t.name} has been <span class="dt">ELIMINATED</span>!`,'sys');
        if(window.MWArenaStatus)MWArenaStatus.onKill(G.allies,atk);
      }
    }
    renderUnits();await sl(180);
  }
}

async function doHeal(u,ab){
  let targets=[];
  if(ab.target==='self')targets=[u];
  else if(ab.target==='lowest_ally'){const a=G.allies.filter(a=>a.hp>0).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp);targets=a.length?[a[0]]:[]}
  else if(ab.target==='all_allies')targets=G.allies.filter(a=>a.hp>0);
  else targets=[u];
  const AX=window.MWArenaThree;
  for(const t of targets){
    const h=Math.round(t.maxHp*ab.healPct);t.hp=Math.min(t.maxHp,t.hp+h);
    if(AX)await AX.playHealVisual(u,t,h,'player');
    lg(`<span class="actor">${u.name}</span> heals ${t.name}: <span class="ht">+${h}</span>`,'pa');
    renderUnits();await sl(200);
  }
}

/* ── TARGETING ── */
function getValidTargets(unit,enemies){
  const a=enemies.filter(e=>e.hp>0);if(!a.length)return[];
  const f=a.filter(e=>e.pos==='front'),m=a.filter(e=>e.pos==='mid'),b=a.filter(e=>e.pos==='back');
  const p=unit.pos;
  if(p==='front'){return f.length?[f[0]]:m.length?[m[0]]:b.length?[b[0]]:[]}
  if(p==='mid'){const t=[...f,...m];return t.length?[t[0]]:b.length?[b[0]]:[]}
  return a.length?[a[0]]:[];
}

/* ── ENEMY AI ── */
async function aiTurn(){
  const AX=window.MWArenaThree;
  const order=[...G.enemies.filter(e=>e.hp>0)].sort((a,b)=>b.speed-a.speed);
  for(const en of order){
    if(!G.allies.filter(a=>a.hp>0).length)break;

    const dmgers=usable.filter(s=>s.dmg);

        ab.target==='all_allies'?G.enemies.filter(e=>e.hp>0):[en];

        lg(`<span class="actor">${en.name}</span> heals ${t.name}: <span class="ht">+${h}</span>`,'ea');
        renderUnits();await sl(200);
      }
    } else if(ab.defend===true||ab.type==='defense'||ab.type==='defend'){
      en.defending=true;
      if(AX)await AX.playDefendVisual(en,'enemy');
      lg(`<span class="actor">${en.name}</span> <span class="ht">DEFENDS</span>`,'ea');
    } else {
      let tgts=ab.target==='all'?G.allies.filter(a=>a.hp>0):ab.target==='any'?[G.allies.filter(a=>a.hp>0).sort((a,b)=>a.hp-b.hp)[0]].filter(Boolean):getValidTargets(en,G.allies);
      const specAll=ab.target==='all'&&String(ab.type||'').toLowerCase()==='special'&&AX;
      if(specAll){
        const packs=[];
        for(const t of tgts)packs.push({t,r:calcDmg(en,t,ab.dmg||1.0,ab.ignoreDef)});
        for(const {t,r} of packs){
          if(r.evaded){
            if(AX){AX.flashUnitById(t.id);AX.popOnUnit(t.id,'EVADE','miss')}
            lg(`<span class="actor">${en.name}</span> → ${t.name}: <span class="ct">EVADE</span>`,'ea');
          }else if(r.damage===0){
            if(AX){AX.flashUnitById(t.id);AX.popOnUnit(t.id,'BLOCK','block')}
            lg(`<span class="actor">${en.name}</span> → ${t.name}: BLOCKED`,'ea');
          }else{
            t.hp=Math.max(0,t.hp-r.damage);G.dt+=r.damage;screenFlash();
            lg(`<span class="actor">${en.name}</span> → ${t.name}: <span class="dt">-${r.damage}</span>${r.crit?' <span class="ct">CRIT!</span>':''}`,'ea');
            if(ab.lifesteal&&r.damage>0){const h=Math.round(r.damage*ab.lifesteal);en.hp=Math.min(en.maxHp,en.hp+h);if(AX)AX.popOnUnit(en.id,'+'+h,'heal')}
          }
        }
        renderUnits();
        const hitPacks=packs.filter(x=>!x.r.evaded&&x.r.damage>0);
        if(hitPacks.length&&AX)await AX.playSpecialAoeVisual(en,ab,hitPacks,'enemy');
        for(const {t,r} of packs){
          if(!r.evaded&&r.damage>0&&t.hp<=0&&AX)await AX.maybeDeathAnim(t,'player');
          if(t.hp<=0)lg(`${t.name} <span class="dt">ELIMINATED</span>!`,'sys');
        }
        renderUnits();
      } else {
        for(const t of tgts){
          const r=calcDmg(en,t,ab.dmg||1.0,ab.ignoreDef);
          if(AX)AX.flashUnitById(t.id);await sl(120);
          if(r.evaded){
            if(AX)AX.popOnUnit(t.id,'EVADE','miss');
            lg(`<span class="actor">${en.name}</span> → ${t.name}: <span class="ct">EVADE</span>`,'ea');
          }else if(r.damage===0){
            if(AX)AX.popOnUnit(t.id,'BLOCK','block');
            lg(`<span class="actor">${en.name}</span> → ${t.name}: BLOCKED`,'ea');
          }else{
            t.hp=Math.max(0,t.hp-r.damage);G.dt+=r.damage;screenFlash();

/* ── RESULT — sync rewards with Mind Wars (pve_submit-equivalent) when PHP boot provides tokens ── */
let squadRewardsSubmitDone=false;
async function submitSquadBattleResult(win){
  if(squadRewardsSubmitDone)return null;
  const b=window.__MW_BATTLE_INIT__;
  if(!b||!b.battleToken||!b.csrfToken)return null;
  squadRewardsSubmitDone=true;
  const url=b.submitResultUrl||'/squad-arena-v2/api/submit_result.php';
  try{
    const r=await fetch(url,{
      method:'POST',
      credentials:'same-origin',
      headers:{'Content-Type':'application/json','X-CSRF-Token':String(b.csrfToken)},
      body:JSON.stringify({
        battle_token:String(b.battleToken),
        result:win?'win':'lose',
        rounds:G.round,
        dmg_dealt:G.dd,
        dmg_taken:G.dt
      })
    });
    const j=await r.json().catch(()=>null);
    if(j&&j.ok&&j.data&&j.data.rewards)return j.data.rewards;
  }catch(err){console.warn('submitSquadBattleResult',err)}
  return null;
}

      const p=document.createElement('div');
      p.className='confetti-p';
      p.style.cssText=`left:${Math.random()*100}%;top:-10px;width:${2+Math.random()*3}px;height:${2+Math.random()*3}px;background:rgba(${150+~~(Math.random()*60)},${50+~~(Math.random()*40)},${80+~~(Math.random()*40)},0.6);border-radius:50%;--dur:${4+Math.random()*4}s;--delay:${Math.random()*2}s;--rot:${Math.random()*360}deg;`;
      confettiEl.appendChild(p);
    }
  }

  /* ── STAGGERED REVEAL ── */
  const icon=document.getElementById('egi');
  const title=document.getElementById('egr');
  const sub=document.getElementById('egs');
  const div1=document.getElementById('egd1');
  const statsEl=document.getElementById('egst');
  const div2=document.getElementById('egd2');
  const xpWrap=document.getElementById('egxp');
  const xpFill=document.getElementById('egxpf');
  const xpVal=document.getElementById('egxpv');
  const rwEl=document.getElementById('egrw');
  const quoteEl=document.getElementById('egq');
  const btnsEl=document.getElementById('egbtns');
  const blEl=document.getElementById('egbl');

  /* Reset all animations */
  [icon,title,sub,div1,div2,xpWrap,quoteEl,btnsEl,blEl].forEach(el=>{if(el)el.classList.remove('anim')});

  /* Icon + Title: 200ms — sin calavera en derrota */
  if(w){
    icon.style.display='';
    icon.textContent='⚡';
    setTimeout(()=>icon.classList.add('anim'),200);
  }else{
    icon.style.display='none';
    icon.textContent='';
    icon.classList.remove('anim');
  }

  title.textContent=w?'VICTORY':'DEFEAT';
  setTimeout(()=>title.classList.add('anim'),400);

  sub.textContent=w?'YOUR SIGNAL RESONATES ACROSS THE VOID':'YOUR SIGNAL HAS BEEN SEVERED';
  setTimeout(()=>sub.classList.add('anim'),650);

  /* Divider 1 */
  setTimeout(()=>div1.classList.add('anim'),850);

  /* Stats — appear one by one with counting animation */
  const statData=[
    {v:G.round,l:'ROUNDS'},
    {v:G.dd,l:'DMG DEALT'},
    {v:G.dt,l:'DMG TAKEN'}
  ];
  statsEl.innerHTML='';
  statData.forEach((s,i)=>{
    const si=document.createElement('div');
    si.className='eg-si';
    si.innerHTML=`<div class="eg-sv" id="egsv${i}">0</div><div class="eg-sl">${s.l}</div>`;
    statsEl.appendChild(si);
    setTimeout(()=>{
      si.classList.add('anim');
      /* Count up animation */
      const target=s.v;
      const svEl=document.getElementById('egsv'+i);
      const countDur=600;
      const t0=performance.now();
      function tick(){
        const p=Math.min((performance.now()-t0)/countDur,1);
        const ease=1-Math.pow(1-p,3);
        svEl.textContent=Math.round(target*ease).toLocaleString();
        if(p<1)requestAnimationFrame(tick);
      }
      tick();
      if(window.MWArenaSFX)MWArenaSFX.playSelect();
    },1000+i*200);
  });

  /* Divider 2 */
  setTimeout(()=>div2.classList.add('anim'),1650);

  /* XP Bar — fill animation */
  xpFill.style.width='0%';
  xpFill.classList.toggle('lose',!w);
  xpVal.textContent='+0 XP';
  setTimeout(()=>{
    xpWrap.classList.add('anim');
    setTimeout(()=>{
      const maxXP=100;
      const pct=Math.min(100,(xp/maxXP)*100);
      xpFill.style.width=pct+'%';
      /* Count up XP number */
      const t0=performance.now();
      function tickXP(){
        const p=Math.min((performance.now()-t0)/1200,1);
        const ease=1-Math.pow(1-p,3);
        xpVal.textContent='+'+Math.round(xp*ease)+' XP';
        if(p<1)requestAnimationFrame(tickXP);
      }
      tickXP();
    },150);
  },1800);

  /* Rewards — pop in one by one */
  rwEl.innerHTML='';
  const rewards=[
    {icon:'✨',val:'+'+xp,cls:'xp',label:'XP'},
    {icon:'',val:(rk>0?'+':'')+rk,cls:'rk',label:'RANK'},
    {icon:'⚡',val:'+'+ke,cls:'ke',label:'KE'}
  ];
  rewards.forEach((r,i)=>{
    const ri=document.createElement('div');
    ri.className='eg-ri';
    ri.innerHTML=`<span class="eg-ri-icon">${r.icon}</span> <span class="eg-rv ${r.cls}">${r.val}</span> ${r.label}`;
    rwEl.appendChild(ri);
    setTimeout(()=>{
      ri.classList.add('anim');
      if(window.MWArenaSFX)MWArenaSFX.playSelect();
    },2400+i*180);
  });

  /* Quote — typewriter effect */
  const chosenQuote=quotes[~~(Math.random()*quotes.length)];
  quoteEl.textContent='';
  setTimeout(()=>{
    quoteEl.classList.add('anim');
    quoteEl.textContent='"';
    let ci=0;
    function typeChar(){
      if(ci<chosenQuote.length){
        quoteEl.textContent='"'+chosenQuote.substring(0,ci+1);
        ci++;
        setTimeout(typeChar,25+Math.random()*15);
      } else {
        quoteEl.textContent='"'+chosenQuote+'"';
      }
    }
    typeChar();
  },3100);

  /* Buttons + bottom line */
  setTimeout(()=>btnsEl.classList.add('anim'),3800);
  setTimeout(()=>blEl.classList.add('anim'),3900);
}

/* ── FX ── */
function flash(id){if(window.MWArenaThree)MWArenaThree.flashUnitById(id)}
function screenFlash(){const s=document.getElementById('sf');s.classList.add('pop');setTimeout(()=>s.classList.remove('pop'),80)}
function pop(id,t,ty){if(window.MWArenaThree)MWArenaThree.popOnUnit(id,t,ty)}
function showPh(t){const o=document.getElementById('phov');document.getElementById('phtx').textContent=t;o.classList.add('show');setTimeout(()=>o.classList.remove('show'),950)}
function lg(m,ty='sys'){const c=document.getElementById('clog');const e=document.createElement('div');e.className='cle '+ty;
  e.innerHTML=`<span class="trn">R${G.round}</span>`+m;c.appendChild(e);while(c.children.length>8)c.removeChild(c.firstChild);
  Array.from(c.children).forEach((el,i,a)=>{el.style.opacity=.25+(i/a.length)*.75})}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}
function goLobby(){window.location.href='/squad-arena-v2/squad-selector.php'}

init();
</script>
</body>
</html>
