<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MIND WARS — Arena</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --void:#010508;--deep:#020a10;--surface:#04131c;
  --c:#00e8ff;--c2:#00a8bb;--cg:rgba(0,232,255,.12);--cb:rgba(0,232,255,.22);
  --m:#9b30ff;--m2:#6b00cc;
  --gold:#ffd600;--green:#00ff88;--red:#ff3d56;--orange:#ff8800;
  --t1:rgba(220,248,255,.95);--t2:rgba(155,215,235,.62);--t3:rgba(90,165,190,.38);--t4:rgba(60,120,145,.2);
  --FD:'Orbitron',monospace;--FB:'Rajdhani',sans-serif;--FM:'Share Tech Mono',monospace;
}
html,body{height:100%;overflow:hidden}
body{background:var(--void);color:var(--t1);font-family:var(--FB);cursor:default;user-select:none}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.04) 2px,rgba(0,0,0,.04) 3px)}

#app{width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ═══ TOP HUD ═══ */
#top-hud{display:flex;align-items:center;justify-content:space-between;padding:0 16px;
  background:linear-gradient(180deg,rgba(2,10,18,.96),rgba(2,10,18,.8));
  border-bottom:1px solid rgba(0,232,255,.1);height:56px;z-index:20;flex-shrink:0;position:relative}
#top-hud::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--c) 30%,var(--m) 50%,var(--c) 70%,transparent 95%);opacity:.3}
.hp-side{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.hp-side.right{flex-direction:row-reverse}
.hp-av{width:40px;height:40px;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;
  font-size:20px;clip-path:polygon(4px 0,100% 0,100% calc(100% - 4px),calc(100% - 4px) 100%,0 100%,0 4px)}
.hp-av.al{background:linear-gradient(135deg,rgba(0,232,255,.15),rgba(0,40,80,.4));border:1px solid rgba(0,232,255,.3)}
.hp-av.en{background:linear-gradient(135deg,rgba(255,61,86,.12),rgba(60,0,20,.4));border:1px solid rgba(255,61,86,.3)}
.hp-inf{display:flex;flex-direction:column;gap:1px;min-width:0}
.hp-nm{font-family:var(--FD);font-size:11px;font-weight:700;letter-spacing:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hp-rk{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--t3)}
.hud-c{display:flex;flex-direction:column;align-items:center;flex-shrink:0;padding:0 20px}
#turn-lbl{font-family:var(--FD);font-size:12px;font-weight:900;letter-spacing:5px;text-shadow:0 0 20px rgba(0,232,255,.5)}
#rnd-lbl{font-family:var(--FM);font-size:8px;letter-spacing:2px;color:var(--t3);margin-top:1px}

/* ═══ ARENA ═══ */
#arena{flex:1;position:relative;overflow:hidden;min-height:0}

/* BG layers */
#arena-bg{position:absolute;inset:0;z-index:0}
.abg-sky{position:absolute;inset:0;
  background:linear-gradient(180deg,#080c18 0%,#0d1525 30%,#14213d 55%,#1a1a3e 70%,#201530 100%)}
.abg-horizon{position:absolute;top:25%;left:0;right:0;height:28%;
  background:linear-gradient(180deg,rgba(180,100,50,.07),rgba(0,180,255,.03),transparent)}
.abg-stars{position:absolute;inset:0}
.st{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) ease-in-out infinite var(--dl,0s)}
@keyframes tw{0%,100%{opacity:.15}50%{opacity:var(--p,.7)}}

/* Perspective floor */
#arena-floor{position:absolute;bottom:0;left:50%;width:150%;transform:translateX(-50%);height:62%;perspective:550px;z-index:1}
#floor-p{width:100%;height:100%;transform:rotateX(56deg);transform-origin:bottom center;position:relative}
#floor-grid{position:absolute;inset:0;
  background-image:linear-gradient(rgba(0,232,255,.055) 1px,transparent 1px),linear-gradient(90deg,rgba(0,232,255,.055) 1px,transparent 1px);
  background-size:56px 56px;
  mask-image:radial-gradient(ellipse 65% 85% at 50% 55%,black 15%,transparent 75%)}
#floor-glow{position:absolute;inset:0;background:radial-gradient(ellipse 45% 55% at 50% 50%,rgba(0,232,255,.05),transparent 65%)}

/* Arena ring */
#arena-ring{position:absolute;bottom:6%;left:50%;transform:translateX(-50%);width:82%;height:0;padding-bottom:32%;z-index:2;pointer-events:none}
#arena-ring::before{content:'';position:absolute;inset:0;border:1px solid rgba(0,232,255,.12);border-radius:50%;
  box-shadow:0 0 25px rgba(0,232,255,.05),inset 0 0 25px rgba(0,232,255,.02);animation:rp 4s ease-in-out infinite}
@keyframes rp{0%,100%{opacity:.4}50%{opacity:.85}}

/* Command frame */
#cmd-fr{position:absolute;inset:0;z-index:10;pointer-events:none}
.fr-e{position:absolute;pointer-events:auto}
.fr-e.l{left:0;top:0;bottom:0;width:55px;background:linear-gradient(to right,rgba(4,18,32,.95),rgba(4,18,32,.5),transparent)}
.fr-e.r{right:0;top:0;bottom:0;width:55px;background:linear-gradient(to left,rgba(4,18,32,.95),rgba(4,18,32,.5),transparent)}
.fr-e.t{top:0;left:0;right:0;height:16px;background:linear-gradient(to bottom,rgba(4,18,32,.85),transparent)}
.fr-pnl{position:absolute;width:40px;height:72px;background:rgba(4,18,32,.92);border:1px solid rgba(0,232,255,.1);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:2px}
.fr-pnl.tl{left:7px;top:50px}.fr-pnl.bl{left:7px;bottom:50px}
.fr-pnl.tr{right:7px;top:50px}.fr-pnl.br{right:7px;bottom:50px}
.fp-l{width:7px;height:7px;border-radius:1px;box-shadow:0 0 5px currentColor}
.fp-l.cy{background:var(--c);color:var(--c)}.fp-l.or{background:var(--orange);color:var(--orange)}
.fp-l.gn{background:var(--green);color:var(--green)}.fp-l.rd{background:var(--red);color:var(--red)}
.fp-l.off{background:rgba(80,100,120,.12);color:transparent;box-shadow:none}
.fr-bar{position:absolute;height:2px;background:linear-gradient(90deg,var(--c),var(--m),var(--c));border-radius:1px;
  box-shadow:0 0 6px rgba(0,232,255,.25);animation:bp 3s ease-in-out infinite}
.fr-bar.tl{top:12px;left:58px;width:100px}.fr-bar.tr{top:12px;right:58px;width:100px}
@keyframes bp{0%,100%{opacity:.35}50%{opacity:.85}}

/* ═══ UNITS ON FIELD ═══ */
#units{position:absolute;inset:0;z-index:5}

.upl{position:absolute;display:flex;flex-direction:column;align-items:center;
  transform:translate(-50%,-50%);transition:all .4s cubic-bezier(.2,.8,.2,1);cursor:pointer;z-index:5}
.upl:hover{z-index:8}
.upl.dead{opacity:.18;pointer-events:none;filter:grayscale(1) brightness(.4)}
.upl.tgt .pb{box-shadow:0 0 28px rgba(255,61,86,.5);border-color:rgba(255,61,86,.5)}
.upl.act .uf{animation:abounce .5s ease}
@keyframes abounce{0%{transform:translateY(0) scale(1)}30%{transform:translateY(-14px) scale(1.1)}100%{transform:translateY(0) scale(1)}}
.upl.sel .pb{border-color:var(--c);box-shadow:0 0 28px rgba(0,232,255,.4)}

/* Hex platform */
.pb{width:115px;height:34px;position:relative;border:1px solid rgba(0,232,255,.22);
  background:linear-gradient(180deg,rgba(0,232,255,.07),rgba(0,232,255,.015));
  clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  box-shadow:0 0 18px rgba(0,232,255,.12);transition:all .3s}
.pb::before{content:'';position:absolute;inset:2px;clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  background:repeating-linear-gradient(90deg,rgba(0,232,255,.035) 0px,transparent 1px,transparent 7px)}
.pb::after{content:'';position:absolute;inset:0;clip-path:polygon(12% 0%,88% 0%,100% 50%,88% 100%,12% 100%,0% 50%);
  background:rgba(0,232,255,.03);animation:pg 3s ease-in-out infinite}
@keyframes pg{0%,100%{opacity:.4}50%{opacity:1}}
.pb.ep{border-color:rgba(255,61,86,.18);background:linear-gradient(180deg,rgba(255,61,86,.05),rgba(255,30,50,.01));
  box-shadow:0 0 14px rgba(255,61,86,.08)}
.pb.ep::before{background:repeating-linear-gradient(90deg,rgba(255,61,86,.025) 0px,transparent 1px,transparent 7px)}
.pb.ep::after{background:rgba(255,61,86,.02)}

/* Unit figure */
.uf{position:relative;display:flex;flex-direction:column;align-items:center;margin-bottom:-3px;transition:transform .3s}
.upl:hover .uf{transform:translateY(-5px)}
.uf-ico{font-size:44px;filter:drop-shadow(0 0 14px rgba(0,232,255,.35));line-height:1;animation:uflt 4s ease-in-out infinite}
.es .uf-ico{filter:drop-shadow(0 0 14px rgba(255,61,86,.25))}
@keyframes uflt{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.hbeam{position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:2px;height:28px;
  background:linear-gradient(0deg,rgba(0,232,255,.2),transparent);filter:blur(1px);pointer-events:none}
.es .hbeam{background:linear-gradient(0deg,rgba(255,61,86,.12),transparent)}

/* Unit HUD */
.uhud{display:flex;flex-direction:column;align-items:center;gap:1px;margin-bottom:2px;min-width:105px}
.upos{font-family:var(--FD);font-size:6px;font-weight:700;letter-spacing:2px;padding:1px 5px;border:1px solid;margin-bottom:1px}
.upos.front{color:#ff6644;border-color:rgba(255,102,68,.3)}.upos.mid{color:#ffcc00;border-color:rgba(255,204,0,.3)}
.upos.back{color:#44ccff;border-color:rgba(68,204,255,.3)}
.unm{font-family:var(--FD);font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--t1);
  text-shadow:0 1px 3px rgba(0,0,0,.9);white-space:nowrap}
.ucl{font-family:var(--FM);font-size:6px;letter-spacing:.8px;color:var(--t3)}
.uhp{width:86px;display:flex;flex-direction:column;gap:1px}
.uhpb{height:5px;background:rgba(0,0,0,.5);border:1px solid rgba(0,232,255,.12);overflow:hidden}
.uhpf{height:100%;transition:width .6s cubic-bezier(.2,.8,.2,1)}
.uhpf.al{background:linear-gradient(90deg,#006080,var(--c))}.uhpf.en{background:linear-gradient(90deg,#801800,var(--red))}
.uhpt{font-family:var(--FM);font-size:7px;color:var(--t2);text-align:center;text-shadow:0 0 3px rgba(0,0,0,.8)}

/* Damage popups */
.dpop{position:absolute;top:-10px;left:50%;transform:translateX(-50%);z-index:100;
  font-family:var(--FD);font-weight:900;letter-spacing:2px;pointer-events:none;white-space:nowrap;
  animation:dfu 1.3s ease-out forwards}
@keyframes dfu{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(.8)}
  30%{transform:translateX(-50%) translateY(-22px) scale(1.3)}100%{opacity:0;transform:translateX(-50%) translateY(-48px) scale(.7)}}
.dpop.damage{color:var(--red);font-size:20px;text-shadow:0 0 10px rgba(255,61,86,.6),0 2px 4px #000}
.dpop.crit{color:var(--gold);font-size:26px;text-shadow:0 0 14px rgba(255,214,0,.7),0 2px 4px #000}
.dpop.heal{color:var(--green);font-size:17px;text-shadow:0 0 8px rgba(0,255,136,.5)}
.dpop.miss{color:var(--t3);font-size:13px}
.iflash{position:absolute;inset:-10px;z-index:20;pointer-events:none;border-radius:50%;
  background:radial-gradient(circle,rgba(0,232,255,.25),transparent 70%);animation:ifl .4s ease-out forwards}
@keyframes ifl{0%{opacity:1;transform:scale(.4)}100%{opacity:0;transform:scale(2.2)}}
.iflash.eh{background:radial-gradient(circle,rgba(255,61,86,.25),transparent 70%)}

/* ═══ COMBAT LOG ═══ */
#clog{position:absolute;top:8px;right:62px;width:190px;z-index:15;pointer-events:none;display:flex;flex-direction:column;gap:2px}
.cle{padding:3px 7px;font-family:var(--FM);font-size:7px;letter-spacing:.3px;color:var(--t2);line-height:1.3;
  background:rgba(2,10,18,.82);border-left:2px solid var(--c);backdrop-filter:blur(5px);
  animation:cli .25s ease both}
@keyframes cli{from{opacity:0;transform:translateX(12px)}to{opacity:1;transform:translateX(0)}}
.cle.dmg{border-left-color:var(--red)}.cle.heal{border-left-color:var(--green)}
.cle.info{border-left-color:var(--gold)}.cle.system{border-left-color:var(--m)}

/* ═══ ACTION PANEL ═══ */
#apanel{z-index:20;flex-shrink:0;border-top:1px solid rgba(0,232,255,.1);
  background:linear-gradient(0deg,rgba(2,8,16,.97),rgba(2,10,18,.92));backdrop-filter:blur(14px);position:relative}
#apanel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 5%,var(--c) 30%,var(--m) 50%,var(--c) 70%,transparent 95%);opacity:.2}
#ainner{display:flex;align-items:stretch;height:145px}

#aunit{width:175px;border-right:1px solid rgba(0,232,255,.07);padding:9px 11px;display:flex;flex-direction:column;gap:2px}
#anm{font-family:var(--FD);font-size:12px;font-weight:900;letter-spacing:2px;color:var(--c)}
#acl{font-family:var(--FM);font-size:8px;letter-spacing:1.5px;color:var(--t3)}
#ast{display:grid;grid-template-columns:1fr 1fr;gap:2px;margin-top:auto}
.as{font-family:var(--FM);font-size:8px;color:var(--t3);display:flex;align-items:center;gap:3px}
.as b{color:var(--t1)}

#skarea{flex:1;padding:8px 12px;display:flex;flex-direction:column;gap:4px;overflow:hidden}
#sklbl{font-family:var(--FD);font-size:7px;letter-spacing:3px;color:var(--t3)}
#skrow{display:flex;gap:8px;flex:1;align-items:stretch}

.skc{flex:1;max-width:172px;background:rgba(0,18,38,.7);border:1px solid rgba(0,232,255,.1);
  padding:7px 9px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
  display:flex;flex-direction:column;gap:2px;
  clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px)}
.skc::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;background:var(--skc,var(--c));opacity:.5;transition:opacity .2s}
.skc:hover{border-color:rgba(0,232,255,.3);background:rgba(0,28,55,.7);transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(0,232,255,.07)}
.skc:hover::before{opacity:1}
.skc.sl{border-color:var(--c);background:rgba(0,35,70,.6);box-shadow:0 0 16px rgba(0,232,255,.1)}
.skc.cdx{opacity:.38;pointer-events:none}
.skt{font-family:var(--FD);font-size:5.5px;letter-spacing:2px;color:var(--skc,var(--t3));text-transform:uppercase}
.skn{font-family:var(--FB);font-size:14px;font-weight:700;color:var(--t1);line-height:1.1}
.skd{font-family:var(--FM);font-size:6.5px;color:var(--t3);line-height:1.3;flex:1}
.skm{display:flex;justify-content:space-between;font-family:var(--FM);font-size:7px}
.skcs{color:var(--gold);letter-spacing:.5px}
.skcv{color:var(--t3);letter-spacing:.5px}.skcv.on{color:var(--red)}

#sndarea{width:148px;border-left:1px solid rgba(0,232,255,.07);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:10px}
#tinfo{font-family:var(--FM);font-size:8px;letter-spacing:1px;color:var(--orange);text-align:center;min-height:14px}
#sbtn{width:100%;padding:13px 0;background:rgba(0,12,30,.9);border:1px solid rgba(0,232,255,.2);
  color:rgba(0,232,255,.3);font-family:var(--FD);font-size:12px;font-weight:900;letter-spacing:4px;
  cursor:not-allowed;transition:all .3s;position:relative;overflow:hidden;
  clip-path:polygon(7px 0%,100% 0%,100% calc(100% - 7px),calc(100% - 7px) 100%,0 100%,0 7px)}
#sbtn.rdy{border-color:var(--c);color:var(--c);cursor:pointer;box-shadow:0 0 18px rgba(0,232,255,.1)}
#sbtn.rdy::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(0,232,255,.05),transparent);animation:sw 2.5s ease infinite}
@keyframes sw{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
#sbtn.rdy:hover{box-shadow:0 0 28px rgba(0,232,255,.22);background:rgba(0,25,55,.9);letter-spacing:6px}
#shint{font-family:var(--FM);font-size:7px;letter-spacing:1px;color:var(--t3);text-align:center}

/* ═══ OVERLAYS ═══ */
#phov{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:rgba(1,5,8,.8);backdrop-filter:blur(8px);opacity:0;pointer-events:none;transition:opacity .35s}
#phov.show{opacity:1;pointer-events:all}
#phtx{font-family:var(--FD);font-size:28px;font-weight:900;letter-spacing:10px;color:var(--c);
  text-shadow:0 0 40px rgba(0,232,255,.5);animation:phz .9s cubic-bezier(.2,.8,.2,1) both}
@keyframes phz{0%{transform:scale(1.6);opacity:0}40%{transform:scale(1);opacity:1}100%{transform:scale(.95);opacity:0}}

#rov{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;
  background:rgba(1,5,8,0);backdrop-filter:blur(0);pointer-events:none;transition:all .7s}
#rov.show{background:rgba(1,5,8,.93);backdrop-filter:blur(18px);pointer-events:all}
#rmod{width:min(92vw,500px);background:rgba(3,12,24,.96);border:1px solid rgba(0,232,255,.18);
  overflow:hidden;position:relative;transform:scale(.88) translateY(30px);opacity:0;
  transition:all .5s cubic-bezier(.2,.8,.2,1) .3s;
  clip-path:polygon(14px 0%,100% 0%,100% calc(100% - 14px),calc(100% - 14px) 100%,0 100%,0 14px)}
#rov.show #rmod{transform:scale(1) translateY(0);opacity:1}
#rmod::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--ra,var(--c)),var(--m),transparent)}
#rhdr{padding:28px 28px 14px;text-align:center}
#rtit{font-family:var(--FD);font-size:34px;font-weight:900;letter-spacing:8px;text-shadow:0 0 40px var(--ra,rgba(0,232,255,.5))}
#rsub{font-family:var(--FM);font-size:9px;letter-spacing:4px;color:var(--t3);margin-top:4px;text-transform:uppercase}
#rsts{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:14px 28px;
  border-top:1px solid rgba(0,232,255,.06);border-bottom:1px solid rgba(0,232,255,.06);background:rgba(0,232,255,.01)}
.ri{text-align:center}.rv{font-family:var(--FD);font-size:22px;font-weight:900;color:var(--t1)}
.rl{font-family:var(--FM);font-size:7px;letter-spacing:2px;color:var(--t3)}
#rrw{display:flex;justify-content:center;gap:18px;padding:14px 28px}
.rw{display:flex;align-items:center;gap:5px;font-family:var(--FM);font-size:12px}
.rwi{font-size:15px}.rwv{font-weight:700}.rwv.xp{color:var(--c)}.rwv.rk{color:var(--gold)}.rwv.ke{color:var(--green)}
#rqt{padding:10px 28px;text-align:center;font-family:var(--FB);font-size:13px;font-style:italic;color:var(--t3);line-height:1.5;border-top:1px solid rgba(0,232,255,.05)}
#ract{display:flex;gap:10px;padding:14px 28px 22px;justify-content:center}
.rb{font-family:var(--FD);font-size:9px;font-weight:700;letter-spacing:3px;padding:11px 26px;
  border:1px solid;cursor:pointer;transition:all .25s;text-transform:uppercase;
  clip-path:polygon(5px 0%,100% 0%,100% calc(100% - 5px),calc(100% - 5px) 100%,0 100%,0 5px)}
.rb.p{border-color:var(--c);color:var(--c);background:rgba(0,232,255,.05)}
.rb.p:hover{background:rgba(0,232,255,.12);box-shadow:0 0 18px rgba(0,232,255,.15)}
.rb.s{border-color:rgba(255,255,255,.12);color:var(--t2);background:transparent}
.rb.s:hover{border-color:rgba(255,255,255,.25)}

#wov{position:absolute;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;
  background:rgba(1,5,8,.4);backdrop-filter:blur(3px);opacity:0;pointer-events:none;transition:opacity .3s}
#wov.show{opacity:1;pointer-events:all}
.wsp{width:44px;height:44px;margin:0 auto 10px;position:relative}
.wr{position:absolute;inset:0;border-radius:50%;border:2px solid transparent;border-top-color:var(--c);animation:ws 1.1s linear infinite}
.wr2{inset:5px;border-width:1px;border-right-color:var(--m);animation-direction:reverse;animation-duration:1.7s}
@keyframes ws{to{transform:rotate(360deg)}}
#wtx{font-family:var(--FD);font-size:10px;letter-spacing:3px;color:var(--c);text-align:center}

@media(max-width:960px){
  .uhud{min-width:85px}.unm{font-size:7px}.uf-ico{font-size:34px}
  .pb{width:92px;height:28px}.uhp{width:68px}
  #aunit{width:135px}.skd{display:none}.skc{max-width:135px}
}
</style>
</head>
<body>
<div id="phov"><div id="phtx"></div></div>
<div id="rov">
  <div id="rmod">
    <div id="rhdr"><div id="rtit"></div><div id="rsub"></div></div>
    <div id="rsts"></div><div id="rrw"></div><div id="rqt"></div>
    <div id="ract"><button class="rb p" onclick="location.reload()">⚔ REMATCH</button><button class="rb s" onclick="goLobby()">← LOBBY</button></div>
  </div>
</div>
<div id="app">
  <div id="top-hud">
    <div class="hp-side left"><div class="hp-av al">⚡</div><div class="hp-inf"><div class="hp-nm">NEUROMANCER_X</div><div class="hp-rk">GOLD IV · LVL 42</div></div></div>
    <div class="hud-c"><div id="turn-lbl" style="color:var(--c)">YOUR TURN</div><div id="rnd-lbl">ROUND 1</div></div>
    <div class="hp-side right"><div class="hp-av en">🔮</div><div class="hp-inf" style="text-align:right"><div class="hp-nm">VOID_PRISM</div><div class="hp-rk">GOLD I · LVL 58</div></div></div>
  </div>
  <div id="arena">
    <div id="arena-bg"><div class="abg-sky"></div><div class="abg-stars" id="stars"></div><div class="abg-horizon"></div></div>
    <div id="arena-floor"><div id="floor-p"><div id="floor-grid"></div><div id="floor-glow"></div></div></div>
    <div id="arena-ring"></div>
    <div id="cmd-fr">
      <div class="fr-e l"></div><div class="fr-e r"></div><div class="fr-e t"></div>
      <div class="fr-pnl tl"><div class="fp-l cy"></div><div class="fp-l gn"></div><div class="fp-l off"></div></div>
      <div class="fr-pnl bl"><div class="fp-l or"></div><div class="fp-l off"></div><div class="fp-l cy"></div></div>
      <div class="fr-pnl tr"><div class="fp-l off"></div><div class="fp-l cy"></div><div class="fp-l or"></div></div>
      <div class="fr-pnl br"><div class="fp-l gn"></div><div class="fp-l cy"></div><div class="fp-l off"></div></div>
      <div class="fr-bar tl"></div><div class="fr-bar tr"></div>
    </div>
    <div id="units"></div>
    <div id="clog"></div>
    <div id="wov"><div><div class="wsp"><div class="wr"></div><div class="wr wr2"></div></div><div id="wtx">OPPONENT'S TURN</div></div></div>
  </div>
  <div id="apanel">
    <div id="ainner">
      <div id="aunit"><div id="anm">—</div><div id="acl">SELECT UNIT</div><div id="ast"></div></div>
      <div id="skarea"><div id="sklbl">ABILITIES</div><div id="skrow"></div></div>
      <div id="sndarea"><div id="tinfo"></div><button id="sbtn" onclick="executeTurn()">SEND</button><div id="shint">SELECT SKILL & TARGET</div></div>
    </div>
  </div>
</div>

<script>
const RC={legendary:'#ffd600',epic:'#c158ff',rare:'#4488ff',special:'#00ffcc',common:'#44aaaa'};
const SC={passive:'#00e8ff',ability:'#c158ff',special:'#ffd600',heal:'#00ff88'};
const PM={enemy:{back:{x:24,y:20},mid:{x:50,y:27},front:{x:76,y:33}},ally:{front:{x:24,y:53},mid:{x:50,y:60},back:{x:76,y:67}}};

const AS=[
  {id:1,name:'NIKOLA TESLA',class:'Strategist',rarity:'legendary',icon:'⚡',mind:88,focus:72,speed:65,luck:40,maxHp:320,hp:320,pos:'front',
    skills:[{type:'ability',name:'Tesla Coil',desc:'Electrocute front — Mind×1.2',dmg:1.2,target:'front',cd:0,maxCd:0,cost:'—'},
      {type:'special',name:'AC Overload',desc:'Chain lightning ALL — Mind×0.6',dmg:.6,target:'all',cd:0,maxCd:3,cost:'3 CD'},
      {type:'heal',name:'Field Charge',desc:'Restore 15% HP to self',healPct:.15,target:'self',cd:0,maxCd:2,cost:'2 CD'},
      {type:'passive',name:'Resonance',desc:'10% stun on hit',passive:true}]},
  {id:2,name:'MARIE CURIE',class:'Controller',rarity:'epic',icon:'☢️',mind:75,focus:85,speed:50,luck:35,maxHp:290,hp:290,pos:'mid',
    skills:[{type:'ability',name:'Radiation Pulse',desc:'Irradiate front/mid — Mind×1.0',dmg:1.0,target:'front_mid',cd:0,maxCd:0,cost:'—'},
      {type:'special',name:'Isotope Decay',desc:'Poison 8% HP/turn ×3',dot:true,target:'any',cd:0,maxCd:3,cost:'3 CD'},
      {type:'heal',name:'Radium Glow',desc:'Heal lowest ally 20%',healPct:.20,target:'lowest_ally',cd:0,maxCd:2,cost:'2 CD'},
      {type:'passive',name:'Half-Life',desc:'DMG +5%/round',passive:true}]},
  {id:3,name:'DRACULA',class:'Striker',rarity:'legendary',icon:'🧛',mind:92,focus:55,speed:78,luck:50,maxHp:280,hp:280,pos:'back',
    skills:[{type:'ability',name:'Blood Fang',desc:'ANY target Mind×1.1 + 20% lifesteal',dmg:1.1,lifesteal:.2,target:'any',cd:0,maxCd:0,cost:'—'},
      {type:'special',name:'Crimson Night',desc:'AOE Mind×0.8 + heal 10%',dmg:.8,lifesteal:.1,target:'all',cd:0,maxCd:4,cost:'4 CD'},
      {type:'heal',name:'Drain Life',desc:'Steal 15% target max HP',stealPct:.15,target:'any',cd:0,maxCd:2,cost:'2 CD'},
      {type:'passive',name:'Immortal',desc:'Survive lethal 1HP once',passive:true}]}
];
const ES=[
  {id:101,name:'KRAKEN',class:'Tank',rarity:'legendary',icon:'🐙',mind:60,focus:95,speed:30,luck:25,maxHp:420,hp:420,pos:'front',
    skills:[{type:'ability',name:'Tentacle Slam',desc:'Crush front Mind×1.0',dmg:1.0,target:'front',cd:0,maxCd:0},
      {type:'special',name:'Tidal Wave',desc:'AOE Mind×0.5',dmg:.5,target:'all',cd:0,maxCd:3},
      {type:'heal',name:'Deep Regen',desc:'Regen 12%',healPct:.12,target:'self',cd:0,maxCd:2},
      {type:'passive',name:'Abyssal Armor',desc:'-15% incoming DMG',passive:true}]},
  {id:102,name:'MORGANA',class:'Controller',rarity:'epic',icon:'🔮',mind:82,focus:78,speed:55,luck:45,maxHp:300,hp:300,pos:'mid',
    skills:[{type:'ability',name:'Dark Binding',desc:'Front/mid Mind×0.9',dmg:.9,target:'front_mid',cd:0,maxCd:0},
      {type:'special',name:'Dimension Rift',desc:'Mind×1.3 ignore DEF',dmg:1.3,ignoreDef:true,target:'any',cd:0,maxCd:3},
      {type:'heal',name:'Shadow Mend',desc:'Heal lowest 18%',healPct:.18,target:'lowest_ally',cd:0,maxCd:2},
      {type:'passive',name:'Seventeen Dimensions',desc:'5% dodge',passive:true}]},
  {id:103,name:'CLEOPATRA',class:'Strategist',rarity:'epic',icon:'👑',mind:78,focus:68,speed:62,luck:55,maxHp:280,hp:280,pos:'back',
    skills:[{type:'ability',name:'Pharaoh Decree',desc:'ANY Mind×0.95',dmg:.95,target:'any',cd:0,maxCd:0},
      {type:'special',name:'Nile Flood',desc:'AOE Mind×0.7',dmg:.7,target:'all',cd:0,maxCd:3},
      {type:'heal',name:'Royal Grace',desc:'Heal all allies 10%',healPct:.10,target:'all_allies',cd:0,maxCd:3},
      {type:'passive',name:'Golden Aura',desc:'+5% luck allies',passive:true}]}
];

let G={round:1,turn:'player',phase:'select',su:null,ss:null,st:null,dd:0,dt:0,allies:[],enemies:[]};

function init(){
  mkStars();
  G.allies=AS.map(u=>({...u,skills:u.skills.map(s=>({...s})),imu:false}));
  G.enemies=ES.map(u=>({...u,skills:u.skills.map(s=>({...s})),imu:false}));
  render();showPh('ROUND 1 — FIGHT');
  setTimeout(()=>pickU(G.allies[0]),1200);
  lg('Neural link established. Battle begins!','system');
}

function mkStars(){const c=document.getElementById('stars');for(let i=0;i<55;i++){const s=document.createElement('div');s.className='st';
  s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*48}%;width:${1+Math.random()*1.5}px;height:${1+Math.random()*1.5}px;--d:${2+Math.random()*4}s;--dl:${Math.random()*3}s;--p:${.3+Math.random()*.6}`;c.appendChild(s)}}

function render(){
  const l=document.getElementById('units');l.innerHTML='';
  rSide(l,G.allies,'ally');rSide(l,G.enemies,'enemy');
}
function rSide(l,units,side){
  const ie=side==='enemy';
  units.forEach(u=>{
    const p=PM[side][u.pos],r=(u.rarity||'common').toLowerCase(),hp=Math.max(0,u.hp/u.maxHp*100),dead=u.hp<=0;
    const d=document.createElement('div');
    d.className='upl'+(dead?' dead':'')+(ie?' es':'');d.id='u-'+u.id;
    d.style.left=p.x+'%';d.style.top=p.y+'%';
    d.onclick=()=>ie?pickT(u):pickU(u);
    d.innerHTML=`<div class="uhud"><div class="upos ${u.pos}">${u.pos.toUpperCase()}</div><div class="unm">${u.name}</div><div class="ucl">${u.class} · ${r.slice(0,3).toUpperCase()}</div><div class="uhp"><div class="uhpb"><div class="uhpf ${ie?'en':'al'}" style="width:${hp}%"></div></div><div class="uhpt">${Math.max(0,u.hp)} / ${u.maxHp}</div></div></div><div class="uf"><div class="uf-ico">${u.icon}</div><div class="hbeam"></div></div><div class="pb ${ie?'ep':''}"></div>`;
    l.appendChild(d);
  });
}

function pickU(u){
  if(G.phase!=='select'||G.turn!=='player'||u.hp<=0)return;
  G.su=u;G.ss=null;G.st=null;
  document.querySelectorAll('.upl').forEach(e=>e.classList.remove('sel','tgt'));
  const e=document.getElementById('u-'+u.id);if(e)e.classList.add('sel');
  document.getElementById('anm').textContent=u.name;
  document.getElementById('anm').style.color=RC[(u.rarity||'common').toLowerCase()]||'var(--c)';
  document.getElementById('acl').textContent=u.class+' · '+u.pos.toUpperCase();
  document.getElementById('ast').innerHTML=`<div class="as">🧠 MND <b>${u.mind}</b></div><div class="as">🛡️ FCS <b>${u.focus}</b></div><div class="as">⚡ SPD <b>${u.speed}</b></div><div class="as">🍀 LCK <b>${u.luck}</b></div>`;
  rSkills(u);updS();
}

function rSkills(u){
  const r=document.getElementById('skrow');r.innerHTML='';
  u.skills.forEach(sk=>{if(sk.passive)return;const oc=sk.cd>0;
    const d=document.createElement('div');d.className='skc'+(oc?' cdx':'');
    d.style.setProperty('--skc',SC[sk.type]||'var(--c)');
    d.onclick=()=>{if(!oc)pickSk(sk,d)};
    d.innerHTML=`<div class="skt">${sk.type}</div><div class="skn">${sk.name}</div><div class="skd">${sk.desc}</div><div class="skm"><span class="skcs">${sk.cost||'—'}</span>${oc?`<span class="skcv on">${sk.cd} CD</span>`:sk.maxCd>0?`<span class="skcv">CD:${sk.maxCd}</span>`:''}</div>`;
    r.appendChild(d);
  });
}

function pickSk(sk,el){
  if(G.phase!=='select')return;G.ss=sk;G.st=null;
  document.querySelectorAll('.skc').forEach(c=>c.classList.remove('sl'));el.classList.add('sl');
  document.querySelectorAll('.upl').forEach(e=>e.classList.remove('tgt'));
  if(sk.healPct||sk.stealPct){
    if(sk.target==='self'){G.st=[G.su];$t('TARGET: SELF')}
    else if(sk.target==='lowest_ally'){const a=G.allies.filter(a=>a.hp>0).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp);G.st=a.length?[a[0]]:[];$t(G.st.length?'TARGET: '+G.st[0].name:'')}
    else if(sk.target==='all_allies'){G.st=G.allies.filter(a=>a.hp>0);$t('TARGET: ALL ALLIES')}
    else{$t('⬡ SELECT TARGET',true)}
  }else if(sk.target==='all'){
    G.st=G.enemies.filter(e=>e.hp>0);G.st.forEach(t=>{const e=document.getElementById('u-'+t.id);if(e)e.classList.add('tgt')});$t('TARGET: ALL ENEMIES');
  }else{
    const v=gV(G.su,sk,G.enemies);
    if(v.length===1){G.st=v;v.forEach(t=>{const e=document.getElementById('u-'+t.id);if(e)e.classList.add('tgt')});$t('TARGET: '+v[0].name)}
    else{$t('⬡ SELECT TARGET',true)}
  }
  updS();
}
function $t(t,o){document.getElementById('tinfo').innerHTML=o?`<span style="color:var(--orange)">${t}</span>`:t}

function pickT(en){
  if(G.phase!=='select'||!G.ss||en.hp<=0)return;
  if(G.ss.target==='all')return;if(G.ss.healPct&&G.ss.target!=='any')return;
  const v=gV(G.su,G.ss,G.enemies);
  if(!v.find(x=>x.id===en.id)){lg(`Can't reach ${en.name} from ${G.su.pos.toUpperCase()}!`,'info');return}
  G.st=[en];document.querySelectorAll('.es').forEach(e=>e.classList.remove('tgt'));
  const e=document.getElementById('u-'+en.id);if(e)e.classList.add('tgt');$t('TARGET: '+en.name);updS();
}

function gV(u,sk,en){
  const a=en.filter(e=>e.hp>0);if(sk.target==='all'||sk.target==='any')return a;
  if(['self','lowest_ally','all_allies'].includes(sk.target))return[];
  const f=a.filter(e=>e.pos==='front'),m=a.filter(e=>e.pos==='mid'),b=a.filter(e=>e.pos==='back');
  if(sk.target==='front')return f.length?f:m.length?m:b;
  if(sk.target==='front_mid'){const t=[...f,...m];return t.length?t:b}
  const p=u.pos;if(p==='front')return f.length?f:m.length?m:b;
  if(p==='mid'){const t=[...f,...m];return t.length?t:b}
  return a;
}

function updS(){const ok=G.su&&G.ss&&G.st&&G.st.length>0;document.getElementById('sbtn').classList.toggle('rdy',ok);
  document.getElementById('shint').textContent=ok?'EXECUTE ACTION':'SELECT SKILL & TARGET'}

async function executeTurn(){
  if(G.phase!=='select')return;const{su:u,ss:sk,st:tgts}=G;if(!u||!sk||!tgts||!tgts.length)return;
  G.phase='anim';document.getElementById('sbtn').classList.remove('rdy');
  const ue=document.getElementById('u-'+u.id);if(ue)ue.classList.add('act');await sl(200);
  if(sk.healPct)await doH(u,sk,tgts);else if(sk.stealPct)await doSt(u,sk,tgts);else await doA(u,sk,tgts);
  if(sk.maxCd>0)sk.cd=sk.maxCd;G.allies.forEach(a=>a.skills.forEach(s=>{if(s.cd>0)s.cd--}));
  await sl(300);if(ue)ue.classList.remove('act');
  document.querySelectorAll('.upl').forEach(e=>{e.classList.remove('tgt','sel')});
  if(chk())return;
  G.turn='enemy';G.phase='enemy';
  document.getElementById('turn-lbl').textContent="ENEMY'S TURN";document.getElementById('turn-lbl').style.color='var(--red)';
  document.getElementById('wov').classList.add('show');
  await sl(1000);await aiTurn();await sl(500);
  document.getElementById('wov').classList.remove('show');if(chk())return;
  G.round++;G.turn='player';G.phase='select';
  document.getElementById('turn-lbl').textContent='YOUR TURN';document.getElementById('turn-lbl').style.color='var(--c)';
  document.getElementById('rnd-lbl').textContent='ROUND '+G.round;showPh('ROUND '+G.round);
  G.enemies.forEach(a=>a.skills.forEach(s=>{if(s.cd>0)s.cd--}));
  G.su=null;G.ss=null;G.st=null;render();
  document.getElementById('anm').textContent='—';document.getElementById('acl').textContent='SELECT UNIT';
  document.getElementById('ast').innerHTML='';document.getElementById('skrow').innerHTML='';$t('');updS();
  const fi=G.allies.find(a=>a.hp>0);if(fi)setTimeout(()=>pickU(fi),400);
}

async function doA(atk,sk,tgts){
  for(const t of tgts){let d=Math.round(atk.mind*(sk.dmg||1));const def=sk.ignoreDef?0:t.focus*.4;d=Math.max(1,Math.round(d-def));
    const cr=Math.random()*100<atk.luck;if(cr)d=Math.round(d*1.8);
    const ms=Math.random()*100<Math.max(0,(t.speed-atk.speed)*.3);
    const dg=t.skills?.find(s=>s.passive&&s.name==='Seventeen Dimensions')&&Math.random()<.05;
    const ar=t.skills?.find(s=>s.passive&&s.name==='Abyssal Armor');if(ar&&!ms&&!dg)d=Math.round(d*.85);
    fxFlash(t.id);await sl(300);
    if(ms||dg){pop(t.id,'MISS','miss');lg(`${atk.name} → ${t.name}: MISS!`,'info')}
    else{t.hp=Math.max(0,t.hp-d);
      if(t.hp<=0&&!t.imu){const im=t.skills?.find(s=>s.passive&&s.name==='Immortal');if(im){t.hp=1;t.imu=true;lg(`${t.name} — IMMORTAL!`,'system')}}
      G.dd+=d;pop(t.id,'-'+d,cr?'crit':'damage');fxImp(t.id,true);lg(`${atk.name} → ${t.name}: ${d}${cr?' CRIT!':''}`,'dmg');
      if(sk.lifesteal){const h=Math.round(d*sk.lifesteal);atk.hp=Math.min(atk.maxHp,atk.hp+h);pop(atk.id,'+'+h,'heal');lg(`${atk.name} steals ${h} HP`,'heal')}}
    render();await sl(200)}
}
async function doH(u,sk,tgts){for(const t of tgts){const h=Math.round(t.maxHp*sk.healPct);t.hp=Math.min(t.maxHp,t.hp+h);pop(t.id,'+'+h,'heal');lg(`${u.name} heals ${t.name} +${h}`,'heal');render();await sl(250)}}
async function doSt(u,sk,tgts){for(const t of tgts){const s=Math.round(t.maxHp*sk.stealPct);t.hp=Math.max(0,t.hp-s);u.hp=Math.min(u.maxHp,u.hp+s);G.dd+=s;pop(t.id,'-'+s,'damage');pop(u.id,'+'+s,'heal');lg(`${u.name} drains ${s} from ${t.name}`,'dmg');render();await sl(250)}}

async function aiTurn(){
  for(const en of G.enemies.filter(e=>e.hp>0)){
    if(!G.allies.filter(a=>a.hp>0).length)break;
    const us=en.skills.filter(s=>!s.passive&&s.cd===0);if(!us.length)continue;
    const lo=en.hp/en.maxHp<.35,hl=us.filter(s=>s.healPct);
    let sk=lo&&hl.length?hl[0]:us.filter(s=>s.dmg).length?us.filter(s=>s.dmg)[~~(Math.random()*us.filter(s=>s.dmg).length)]:us[0];
    let tg;
    if(sk.healPct){if(sk.target==='self')tg=[en];else if(sk.target==='lowest_ally'){const sr=G.enemies.filter(e=>e.hp>0).sort((a,b)=>a.hp/a.maxHp-b.hp/b.maxHp);tg=[sr[0]]}
      else if(sk.target==='all_allies')tg=G.enemies.filter(e=>e.hp>0);else tg=[en]}
    else{const v=gV(en,sk,G.allies);tg=sk.target==='all'?G.allies.filter(a=>a.hp>0):v.length?[v[~~(Math.random()*v.length)]]:[];}
    if(!tg||!tg.length)continue;
    const ee=document.getElementById('u-'+en.id);if(ee)ee.classList.add('act');await sl(300);
    if(sk.healPct){for(const t of tg){const h=Math.round(t.maxHp*sk.healPct);t.hp=Math.min(t.maxHp,t.hp+h);pop(t.id,'+'+h,'heal');lg(`${en.name} heals ${t.name} +${h}`,'heal')}}
    else{for(const t of tg){let d=Math.round(en.mind*(sk.dmg||1));const def=sk.ignoreDef?0:t.focus*.4;d=Math.max(1,Math.round(d-def));
      const cr=Math.random()*100<en.luck;if(cr)d=Math.round(d*1.8);const ms=Math.random()*100<Math.max(0,(t.speed-en.speed)*.3);
      fxFlash(t.id);await sl(300);
      if(ms){pop(t.id,'MISS','miss');lg(`${en.name} → ${t.name}: MISS!`,'info')}
      else{t.hp=Math.max(0,t.hp-d);if(t.hp<=0&&!t.imu){const im=t.skills?.find(s=>s.passive&&s.name==='Immortal');if(im){t.hp=1;t.imu=true;lg(`${t.name} IMMORTAL!`,'system')}}
        G.dt+=d;pop(t.id,'-'+d,cr?'crit':'damage');fxImp(t.id,false);lg(`${en.name} → ${t.name}: ${d}${cr?' CRIT!':''}`,'dmg');
        if(sk.lifesteal){const h=Math.round(d*sk.lifesteal);en.hp=Math.min(en.maxHp,en.hp+h);pop(en.id,'+'+h,'heal')}}await sl(200)}}
    if(sk.maxCd>0)sk.cd=sk.maxCd;if(ee)ee.classList.remove('act');render();await sl(350);
  }
}

function chk(){
  if(!G.enemies.filter(e=>e.hp>0).length){G.phase='done';setTimeout(()=>showRes(true),700);return true}
  if(!G.allies.filter(a=>a.hp>0).length){G.phase='done';setTimeout(()=>showRes(false),700);return true}
  return false;
}

function showRes(w){
  document.getElementById('rtit').textContent=w?'VICTORY':'DEFEAT';
  document.getElementById('rtit').style.color=w?'var(--c)':'var(--red)';
  document.getElementById('rsub').textContent=w?'YOUR SIGNAL RESONATES ACROSS THE VOID':'YOUR SIGNAL HAS BEEN SEVERED';
  document.getElementById('rmod').style.setProperty('--ra',w?'var(--c)':'var(--red)');
  const xp=w?~~(12+G.round*2):~~(5+G.round),rk=w?~~(3+G.round):-~~(2+G.round*.5),ke=w?~~(2+G.round*1.5):~~(1+G.round*.5);
  document.getElementById('rsts').innerHTML=`<div class="ri"><div class="rv">${G.round}</div><div class="rl">ROUNDS</div></div><div class="ri"><div class="rv">${G.dd.toLocaleString()}</div><div class="rl">DMG DEALT</div></div><div class="ri"><div class="rv">${G.dt.toLocaleString()}</div><div class="rl">DMG TAKEN</div></div>`;
  document.getElementById('rrw').innerHTML=`<div class="rw"><span class="rwi">✨</span><span class="rwv xp">+${xp}</span> XP</div><div class="rw"><span class="rwi">🏆</span><span class="rwv rk">${rk>0?'+':''}${rk}</span> RANK</div><div class="rw"><span class="rwi">⚡</span><span class="rwv ke">+${ke}</span> KE</div>`;
  const q=w?["Your neural pathways evolved beyond comprehension.","The void bows to your strategic supremacy.","Every dimension collapsed in your favor."]:
    ["Morgana's seventeen dimensions collapsed your strategy.","The Kraken's abyss swallowed your signal.","Your neural link was severed."];
  document.getElementById('rqt').textContent='"'+q[~~(Math.random()*q.length)]+'"';
  document.getElementById('rov').classList.add('show');
}

function fxFlash(id){const e=document.getElementById('u-'+id);if(!e)return;e.style.transition='filter .08s';e.style.filter='brightness(2.5)';setTimeout(()=>{e.style.filter=''},120)}
function fxImp(id,isA){const e=document.getElementById('u-'+id);if(!e)return;const f=document.createElement('div');f.className='iflash'+(isA?'':' eh');e.appendChild(f);setTimeout(()=>f.remove(),500)}
function pop(id,t,ty){const e=document.getElementById('u-'+id);if(!e)return;const p=document.createElement('div');p.className='dpop '+ty;p.textContent=t;p.style.left=(40+Math.random()*20)+'%';e.appendChild(p);setTimeout(()=>p.remove(),1400)}
function showPh(t){const o=document.getElementById('phov');document.getElementById('phtx').textContent=t;o.classList.add('show');setTimeout(()=>o.classList.remove('show'),950)}
function lg(m,ty='info'){const c=document.getElementById('clog');const e=document.createElement('div');e.className='cle '+ty;e.textContent=m;c.appendChild(e);while(c.children.length>7)c.removeChild(c.firstChild);Array.from(c.children).forEach((el,i,a)=>{el.style.opacity=.3+(i/a.length)*.7})}
function sl(ms){return new Promise(r=>setTimeout(r,ms))}
function goLobby(){window.location.href='/mind-wars-select.php'}

init();
