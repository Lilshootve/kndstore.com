<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>KND Labs – Model Viewer</title>
  <meta name="description" content="GLB model viewer for KND Labs.">
  <style>
    :root {
      color-scheme: dark;
      --bg: #050816;
      --bg-alt: #0b1220;
      --border: #1f2937;
      --text: #f9fafb;
      --text-muted: #9ca3af;
      --accent: #22d3ee;
      --accent-soft: rgba(34, 211, 238, 0.12);
      --danger: #f97373;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #0b1120 0, #020617 55%, #000 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
    }
    .mv-root {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 12px;
      gap: 10px;
    }
    .mv-header {
      display: flex;
      flex-wrap: wrap;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
    }
    .mv-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .mv-subtitle {
      font-size: 12px;
      color: var(--text-muted);
    }
    .mv-main {
      position: relative;
      flex: 1;
      min-height: 260px;
      border-radius: 10px;
      background: radial-gradient(circle at 10% 0, rgba(34, 211, 238, 0.2), transparent 55%), radial-gradient(circle at 90% 100%, rgba(96, 165, 250, 0.2), transparent 55%), var(--bg-alt);
      border: 1px solid rgba(15, 23, 42, 0.9);
      overflow: hidden;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
    }
    .mv-canvas-wrap {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: stretch;
      justify-content: stretch;
    }
    model-viewer {
      width: 100%;
      height: 100%;
      --poster-color: rgba(15, 23, 42, 0.95);
      --progress-bar-color: var(--accent);
      --progress-bar-height: 4px;
      background: transparent;
    }
    .mv-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .mv-loader,
    .mv-error,
    .mv-empty {
      padding: 14px 18px;
      border-radius: 999px;
      background: rgba(15, 23, 42, 0.96);
      border: 1px solid rgba(75, 85, 99, 0.5);
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 12px;
      color: var(--text-muted);
      box-shadow: 0 5px 22px rgba(0, 0, 0, 0.7);
    }
    .mv-loader-icon {
      width: 14px;
      height: 14px;
      border-radius: 999px;
      border: 2px solid rgba(55, 65, 81, 0.6);
      border-top-color: var(--accent);
      animation: mv-spin 0.8s linear infinite;
    }
    @keyframes mv-spin {
      to { transform: rotate(360deg); }
    }
    .mv-error {
      border-color: rgba(239, 68, 68, 0.5);
      color: var(--danger);
    }
    .mv-empty {
      color: var(--text-muted);
    }
    .mv-error-icon {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      border: 2px solid var(--danger);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
    }
    .mv-toolbar {
      position: relative;
      z-index: 2;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 6px;
      padding: 8px 10px 0;
      font-size: 11px;
      color: var(--text-muted);
    }
    .mv-toolbar-left,
    .mv-toolbar-right {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }
    .mv-btn {
      border-radius: 999px;
      border: 1px solid rgba(55, 65, 81, 0.7);
      background: radial-gradient(circle at 0 0, rgba(34, 211, 238, 0.18), rgba(15, 23, 42, 0.98));
      color: var(--text);
      font-size: 11px;
      padding: 5px 10px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
    }
    .mv-btn span.mv-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px rgba(34, 211, 238, 0.22);
    }
    .mv-btn:hover {
      border-color: var(--accent);
      background: radial-gradient(circle at 0 0, rgba(34, 211, 238, 0.24), rgba(15, 23, 42, 1));
    }
    .mv-btn:active {
      transform: translateY(1px);
    }
    .mv-btn[disabled],
    .mv-btn.mv-disabled {
      opacity: 0.45;
      cursor: default;
      background: rgba(15, 23, 42, 0.9);
      border-style: dashed;
    }
    .mv-meta {
      font-size: 11px;
      color: var(--text-muted);
      max-width: 48%;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .mv-meta strong {
      color: var(--text);
      font-weight: 500;
    }
    .mv-danger-text {
      color: var(--danger);
    }
    @media (max-width: 640px) {
      .mv-main {
        min-height: 220px;
      }
      .mv-meta {
        max-width: 100%;
      }
    }
  </style>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@google/model-viewer/dist/model-viewer.min.js"></script>
</head>
<body>
  <div class="mv-root" id="mv-root">
    <header class="mv-header">
      <div>
        <div class="mv-title" id="mv-title">Model Viewer</div>
        <div class="mv-subtitle" id="mv-subtitle">GLB preview with orbit controls.</div>
      </div>
      <div class="mv-subtitle" id="mv-model-label"></div>
    </header>

    <div class="mv-main" id="mv-main">
      <div class="mv-canvas-wrap">
        <model-viewer id="mv-viewer"
          src=""
          camera-controls
          autoplay
          auto-rotate
          exposure="0.9"
          environment-intensity="1.0"
          shadow-intensity="0.6"
          ar-modes="webxr scene-viewer quick-look"
          interaction-prompt="auto"
        ></model-viewer>
      </div>
      <div class="mv-overlay" id="mv-overlay">
        <div class="mv-loader" id="mv-loader">
          <div class="mv-loader-icon" aria-hidden="true"></div>
          <div>
            <div>Loading model&hellip;</div>
            <div class="mv-subtitle">This can take a few seconds.</div>
          </div>
        </div>
      </div>
    </div>

    <div class="mv-toolbar" aria-label="Viewer controls">
      <div class="mv-toolbar-left">
        <button type="button" class="mv-btn" id="mv-reset-btn">
          <span class="mv-dot" aria-hidden="true"></span>
          <span>Reset view</span>
        </button>
        <button type="button" class="mv-btn" id="mv-fullscreen-btn">
          <span aria-hidden="true">&#x26F6;</span>
          <span>Fullscreen</span>
        </button>
      </div>
      <div class="mv-toolbar-right">
        <button type="button" class="mv-btn mv-disabled" id="mv-download-btn">
          <span aria-hidden="true">&#x2B07;</span>
          <span id="mv-download-label">Download ZIP</span>
        </button>
        <div class="mv-meta" id="mv-meta"></div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const params = new URLSearchParams(window.location.search || '');
      const viewer = document.getElementById('mv-viewer');
      const root = document.getElementById('mv-root');
      const overlay = document.getElementById('mv-overlay');
      const loader = document.getElementById('mv-loader');
      let errorEl = null;
      let emptyEl = null;
      const titleEl = document.getElementById('mv-title');
      const subtitleEl = document.getElementById('mv-subtitle');
      const labelEl = document.getElementById('mv-model-label');
      const metaEl = document.getElementById('mv-meta');
      const resetBtn = document.getElementById('mv-reset-btn');
      const fullscreenBtn = document.getElementById('mv-fullscreen-btn');
      const dlBtn = document.getElementById('mv-download-btn');
      const dlLabel = document.getElementById('mv-download-label');

      const modelUrl = params.get('model') || params.get('model_url') || '';
      const zipUrl = params.get('zip') || params.get('download_zip_url') || '';
      const modelTitle = params.get('title') || 'Model Viewer';
      const modelDesc = params.get('description') || 'GLB preview with orbit controls.';
      const thumbUrl = params.get('thumb') || params.get('thumbnail_url') || '';

      function setText(el, value) {
        if (el) el.textContent = value || '';
      }

      function showLoader(show) {
        if (!overlay || !loader) return;
        overlay.style.display = show ? 'flex' : 'none';
        loader.style.display = show ? 'flex' : 'none';
        if (errorEl) errorEl.style.display = 'none';
        if (emptyEl) emptyEl.style.display = 'none';
      }

      function ensureErrorEl() {
        if (errorEl) return errorEl;
        errorEl = document.createElement('div');
        errorEl.className = 'mv-error';
        errorEl.innerHTML = '<div class="mv-error-icon">!</div><div><div>Could not load model.</div><div class="mv-subtitle mv-danger-text">Check the URL or try again later.</div></div>';
        if (overlay) overlay.appendChild(errorEl);
        return errorEl;
      }

      function ensureEmptyEl() {
        if (emptyEl) return emptyEl;
        emptyEl = document.createElement('div');
        emptyEl.className = 'mv-empty';
        emptyEl.innerHTML = '<div class="mv-error-icon" aria-hidden="true">?</div><div><div>No model to display.</div><div class="mv-subtitle">Pass ?model=/path/to/model.glb in the URL.</div></div>';
        if (overlay) overlay.appendChild(emptyEl);
        return emptyEl;
      }

      function showError() {
        if (!overlay) return;
        overlay.style.display = 'flex';
        if (loader) loader.style.display = 'none';
        ensureErrorEl().style.display = 'flex';
      }

      function showEmpty() {
        if (!overlay) return;
        overlay.style.display = 'flex';
        if (loader) loader.style.display = 'none';
        ensureEmptyEl().style.display = 'flex';
      }

      function configureDownload() {
        if (!dlBtn || !dlLabel) return;
        if (!zipUrl) {
          dlBtn.classList.add('mv-disabled');
          dlBtn.setAttribute('aria-disabled', 'true');
          dlBtn.onclick = null;
          setText(dlLabel, 'Download ZIP (unavailable)');
        } else {
          dlBtn.classList.remove('mv-disabled');
          dlBtn.removeAttribute('aria-disabled');
          setText(dlLabel, 'Download ZIP');
          dlBtn.onclick = function() {
            try {
              const a = document.createElement('a');
              a.href = zipUrl;
              a.download = '';
              a.rel = 'noopener noreferrer';
              document.body.appendChild(a);
              a.click();
              a.remove();
            } catch (e) {
              window.location.href = zipUrl;
            }
          };
        }
      }

      function configureMeta() {
        if (!metaEl) return;
        const parts = [];
        if (modelUrl) parts.push('Source: ' + modelUrl);
        if (zipUrl) parts.push('ZIP ready');
        metaEl.textContent = parts.join(' · ');
      }

      function configureHeader() {
        setText(titleEl, modelTitle);
        setText(subtitleEl, modelDesc);
        if (labelEl && modelUrl) {
          const name = modelUrl.split('/').pop() || '';
          setText(labelEl, name);
        }
      }

      function configurePoster() {
        if (!viewer) return;
        if (thumbUrl) {
          viewer.setAttribute('poster', thumbUrl);
        }
      }

      function configureReset(initialOrbit) {
        if (!resetBtn || !viewer) return;
        const orbit = initialOrbit || viewer.getAttribute('camera-orbit') || 'auto';
        resetBtn.addEventListener('click', function() {
          try {
            if ('cameraOrbit' in viewer) {
              viewer.cameraOrbit = orbit;
            } else {
              viewer.setAttribute('camera-orbit', orbit);
            }
          } catch (e) {
            viewer.setAttribute('camera-orbit', orbit);
          }
        });
      }

      function configureFullscreen() {
        if (!fullscreenBtn || !root) return;
        fullscreenBtn.addEventListener('click', function() {
          try {
            if (!document.fullscreenElement) {
              if (root.requestFullscreen) root.requestFullscreen();
            } else if (document.exitFullscreen) {
              document.exitFullscreen();
            }
          } catch (e) {
            // ignore
          }
        });
      }

      if (!modelUrl) {
        showEmpty();
        configureDownload();
        configureMeta();
        configureHeader();
        configureFullscreen();
        return;
      }

      configureHeader();
      configureDownload();
      configureMeta();
      configurePoster();
      configureFullscreen();

      if (!viewer) {
        showError();
        return;
      }

      showLoader(true);

      let initialOrbit = null;
      viewer.addEventListener('load', function() {
        if (!initialOrbit) {
          initialOrbit = viewer.getAttribute('camera-orbit') || 'auto';
          configureReset(initialOrbit);
        }
        showLoader(false);
      });

      viewer.addEventListener('error', function() {
        showError();
      });

      try {
        viewer.src = modelUrl;
      } catch (e) {
        showError();
      }
    })();
  </script>
</body>
</html>
